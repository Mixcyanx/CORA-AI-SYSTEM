    <script>
(function(){
  try {
    (function(){
    var saved='';
    try{saved=localStorage.getItem('theme')||localStorage.getItem('color-theme')||localStorage.getItem('appearance')||'';}catch(e){}
    var isDark=saved!== 'light';
    document.documentElement.classList.toggle('dark',isDark);
    document.documentElement.style.colorScheme=isDark?'dark':'light';
    document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
    try{ if(!saved){ localStorage.setItem('theme',isDark?'dark':'light'); localStorage.setItem('color-theme',isDark?'dark':'light'); } }catch(e){}
  })();
  } catch (e) {}
})();
</script>

  <body>
    <div id="root"></div>
      <script>
(function(){
  const synth = window.speechSynthesis;
  let voices = [];
  let lastSpokenText = '';
  let speechUnlocked = false;
  let observerStarted = false;
  const spokenCache = new Set();

  function refreshVoices(){
    try { voices = synth ? synth.getVoices() || [] : []; } catch(e) { voices = []; }
    return voices;
  }

  function pickVoice(){
    const list = voices.length ? voices : refreshVoices();
    if (!list.length) return null;
    return list.find(v => /zh-TW/i.test(v.lang) || /Taiwan/i.test(v.name))
      || list.find(v => /zh-HK/i.test(v.lang))
      || list.find(v => /^zh/i.test(v.lang))
      || list.find(v => /Chinese|中文|國語|華語/i.test(v.name))
      || list[0];
  }

  function unlockSpeech(){
    if (!synth || speechUnlocked) return;
    try {
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      synth.speak(u);
      speechUnlocked = true;
    } catch(e) {}
  }

  function normalizeText(text){
    return String(text || '')
      .replace(/\s+/g, ' ')
      .replace(/[​-‍﻿]/g, '')
      .trim();
  }

  function speakLocal(text){
    const clean = normalizeText(text);
    if (!clean || !synth) return false;
    if (clean.length < 2) return false;
    if (clean === lastSpokenText) return true;
    try {
      synth.cancel();
      const u = new SpeechSynthesisUtterance(clean);
      const v = pickVoice();
      if (v) u.voice = v;
      u.lang = v && v.lang ? v.lang : 'zh-TW';
      u.rate = 1;
      u.pitch = 1;
      u.volume = 1;
      synth.speak(u);
      lastSpokenText = clean;
      return true;
    } catch(e) {
      return false;
    }
  }

  window.__LOCAL_VOICE_FALLBACK__ = {
    speak: speakLocal,
    stop: function(){ try { synth && synth.cancel(); } catch(e) {} },
    unlock: unlockSpeech,
    getVoices: function(){ return refreshVoices(); }
  };

  window.addEventListener('pointerdown', unlockSpeech, { passive: true });
  window.addEventListener('touchstart', unlockSpeech, { passive: true });
  window.addEventListener('click', unlockSpeech, { passive: true });

  if (synth && 'onvoiceschanged' in synth) {
    synth.onvoiceschanged = refreshVoices;
  }
  refreshVoices();

  const originalFetch = window.fetch ? window.fetch.bind(window) : null;
  if (originalFetch) {
    window.fetch = async function(input, init){
      try {
        const res = await originalFetch(input, init);
        try {
          const url = typeof input === 'string' ? input : (input && input.url) || '';
          if (!res.ok && /audio|speech|tts|voice/i.test(url)) {
            const bodyText = init && typeof init.body === 'string' ? init.body : '';
            const m = bodyText.match(/"text"\s*:\s*"([^"]{2,500})/);
            if (m) setTimeout(() => speakLocal(m[1]), 0);
          }
        } catch(e) {}
        return res;
      } catch (err) {
        try {
          const url = typeof input === 'string' ? input : (input && input.url) || '';
          if (/audio|speech|tts|voice/i.test(url)) {
            const bodyText = init && typeof init.body === 'string' ? init.body : '';
            const m = bodyText.match(/"text"\s*:\s*"([^"]{2,500})/);
            if (m) speakLocal(m[1]);
          }
        } catch(e) {}
        throw err;
      }
    };
  }

  function candidateTextFromNode(node){
    if (!node || !node.innerText) return '';
    const text = normalizeText(node.innerText);
    if (!text) return '';
    if (text.length > 800) return text.slice(0, 800);
    return text;
  }

  function maybeSpeakLatestAssistant(){
    const selectors = [
      '[data-message-role="assistant"]',
      '[data-role="assistant"]',
      '.assistant-message',
      '.message.assistant',
      '[aria-label*="assistant" i]',
      '[class*="assistant"]'
    ];
    let nodes = [];
    selectors.forEach(sel => {
      try { nodes.push(...document.querySelectorAll(sel)); } catch(e) {}
    });
    if (!nodes.length) return;
    const node = nodes[nodes.length - 1];
    const text = candidateTextFromNode(node);
    if (!text) return;
    if (spokenCache.has(text)) return;
    spokenCache.add(text);
    if (spokenCache.size > 20) {
      const first = spokenCache.values().next().value;
      spokenCache.delete(first);
    }
    speakLocal(text);
  }

  function startObserver(){
    if (observerStarted) return;
    observerStarted = true;
    const root = document.getElementById('root') || document.body;
    const mo = new MutationObserver(() => {
      clearTimeout(window.__speakObserverTimer__);
      window.__speakObserverTimer__ = setTimeout(maybeSpeakLatestAssistant, 350);
    });
    mo.observe(root, { childList: true, subtree: true, characterData: true });
    setTimeout(maybeSpeakLatestAssistant, 1200);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserver);
  } else {
    startObserver();
  }
})();
</script>

  
<style id="force-dark-startup-style">
html.dark,html.dark body{background:#0b0f19 !important;color:#f3f4f6 !important;color-scheme:dark !important;}
html:not(.dark),html:not(.dark) body{background:#f8fafc !important;color:#0f172a !important;color-scheme:light !important;}
#root,[id="app"],[class*="app"]{background:transparent !important;}
</style>
<script>
(function(){
  const INTRO_KEY = 'cora_intro_played_v3';
  const INTRO_TEXT = '哈囉，我是你的中文 AI 藥物解說助理 Cora。你可以直接打字、按住麥克風說話，或拍照上傳藥袋與藥盒，我會幫你一起辨識與說明。';
  let introStarted = false;
  let introDone = false;

  function getStoredTheme(){
    try {
      return localStorage.getItem('theme') || localStorage.getItem('color-theme') || localStorage.getItem('appearance') || '';
    } catch(e) { return ''; }
  }

  function applyTheme(theme){
    try {
      const html = document.documentElement;
      const body = document.body;
      const isDark = theme !== 'light';
      html.classList.toggle('dark', isDark);
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      html.style.colorScheme = isDark ? 'dark' : 'light';
      if (body) {
        body.classList.toggle('dark', isDark);
        body.style.background = isDark ? '#0b0f19' : '#f8fafc';
        body.style.color = isDark ? '#f3f4f6' : '#0f172a';
      }
      try {
        const value = isDark ? 'dark' : 'light';
        localStorage.setItem('theme', value);
        localStorage.setItem('color-theme', value);
        localStorage.setItem('appearance', value);
      } catch(e) {}
    } catch(e) {}
  }

  function syncThemeFromApp(){
    try {
      const html = document.documentElement;
      const observer = new MutationObserver(function(){
        const current = html.classList.contains('dark') ? 'dark' : 'light';
        html.setAttribute('data-theme', current);
        html.style.colorScheme = current;
        try {
          localStorage.setItem('theme', current);
          localStorage.setItem('color-theme', current);
          localStorage.setItem('appearance', current);
        } catch(e) {}
        if (document.body) {
          document.body.style.background = current === 'dark' ? '#0b0f19' : '#f8fafc';
          document.body.style.color = current === 'dark' ? '#f3f4f6' : '#0f172a';
        }
      });
      observer.observe(html, { attributes:true, attributeFilter:['class'] });
    } catch(e) {}
  }

  function getZhVoice(){
    try {
      const synth = window.speechSynthesis;
      if (!synth) return null;
      const voices = synth.getVoices ? synth.getVoices() : [];
      return voices.find(v => /zh[-_]?TW/i.test(v.lang))
        || voices.find(v => /zh/i.test(v.lang) && /Taiwan|台灣|Hsinchu|Mei-Jia|Ting-Ting/i.test((v.name||'')))
        || voices.find(v => /zh/i.test(v.lang))
        || null;
    } catch(e) { return null; }
  }

  function animateAvatarSpeaking(active){
    try {
      document.documentElement.classList.toggle('tts-speaking', !!active);
      const targets = document.querySelectorAll('[class*="avatar"], [id*="avatar"], model-viewer, canvas');
      targets.forEach(el => {
        if (active) el.setAttribute('data-speaking','1');
        else el.removeAttribute('data-speaking');
      });
    } catch(e) {}
  }

  function speakIntro(force){
    if (introDone || introStarted) return;
    introStarted = true;
    try {
      const synth = window.speechSynthesis;
      if (!synth || typeof SpeechSynthesisUtterance === 'undefined') {
        introStarted = false;
        return;
      }
      if (!force && document.visibilityState === 'hidden') {
        introStarted = false;
        return;
      }
      try { synth.cancel(); } catch(e) {}
      const u = new SpeechSynthesisUtterance(INTRO_TEXT);
      u.lang = 'zh-TW';
      u.rate = 1;
      u.pitch = 1;
      u.volume = 1;
      const v = getZhVoice();
      if (v) u.voice = v;
      u.onstart = function(){ animateAvatarSpeaking(true); };
      u.onend = function(){
        animateAvatarSpeaking(false);
        introDone = true;
        try { localStorage.setItem(INTRO_KEY,'1'); } catch(e) {}
      };
      u.onerror = function(){
        animateAvatarSpeaking(false);
        introStarted = false;
      };
      synth.speak(u);
    } catch(e) {
      introStarted = false;
    }
  }

  function bindIntroUnlock(){
    const once = function(){
      try {
        if (!introDone) speakIntro(true);
      } finally {
        window.removeEventListener('click', once, true);
        window.removeEventListener('touchstart', once, true);
        window.removeEventListener('pointerdown', once, true);
      }
    };
    window.addEventListener('click', once, true);
    window.addEventListener('touchstart', once, true);
    window.addEventListener('pointerdown', once, true);
  }

  function patchSpeech(){
    if (window.__introSpeechPatched__) return;
    window.__introSpeechPatched__ = true;
    const synth = window.speechSynthesis;
    if (!synth) return;
    const rawSpeak = synth.speak.bind(synth);
    const rawCancel = synth.cancel.bind(synth);
    synth.speak = function(utt){
      try {
        const prevStart = utt.onstart;
        const prevEnd = utt.onend;
        const prevError = utt.onerror;
        utt.onstart = function(ev){ animateAvatarSpeaking(true); if (typeof prevStart === 'function') prevStart.call(this, ev); };
        utt.onend = function(ev){ animateAvatarSpeaking(false); if (typeof prevEnd === 'function') prevEnd.call(this, ev); };
        utt.onerror = function(ev){ animateAvatarSpeaking(false); if (typeof prevError === 'function') prevError.call(this, ev); };
      } catch(e) {}
      return rawSpeak(utt);
    };
    synth.cancel = function(){ animateAvatarSpeaking(false); return rawCancel(); };
  }

  function init(){
    const storedTheme = getStoredTheme();
    applyTheme(storedTheme === 'light' ? 'light' : 'dark');
    patchSpeech();
    bindIntroUnlock();
    syncThemeFromApp();
    try {
      if (!localStorage.getItem(INTRO_KEY)) {
        setTimeout(function(){ speakIntro(false); }, 1200);
      }
    } catch(e) {
      setTimeout(function(){ speakIntro(false); }, 1200);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();
</script>
