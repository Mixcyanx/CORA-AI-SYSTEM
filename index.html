    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Lucide Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Convert kebab-case to PascalCase for Lucide CDN icons
                    const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                    
                    // Try to find the icon in lucide.icons or lucide directly
                    const icon = (lucide.icons && lucide.icons[pascalName]) || 
                                 (lucide.icons && lucide.icons[name]) || 
                                 lucide[pascalName] || 
                                 lucide[name] || 
                                 (lucide.icons && lucide.icons['HelpCircle']) || 
                                 lucide['HelpCircle'];
                    
                    if (icon && typeof icon.toSvg === 'function') {
                        iconRef.current.innerHTML = icon.toSvg({
                            'stroke-width': 2,
                            'width': size,
                            'height': size,
                            'class': className
                        });
                    } else {
                        console.warn(`Icon not found: ${name}`);
                        // Final fallback: try to use createIcons if direct access fails
                        iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        if (typeof lucide.createIcons === 'function') {
                            lucide.createIcons();
                        }
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }} />;
        };

        // --- OpenAI SDK Mini Implementation ---
        
class OpenAI {
    constructor(workerUrl) { this.workerUrl = workerUrl; }

    async request(payload, idToken = null) {
        const response = await fetch(this.workerUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                ...(idToken ? { "Authorization": `Bearer ${idToken}` } : {})
            },
            body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Worker API Error");
        return data;
    }

    async ask(question, history = [], chatId = null, idToken = null, conversationId = null, images = []) {
        return this.request({ action: "ask", question, history, chatId, conversationId, images }, idToken);
    }
    async listConversations(idToken) { return this.request({ action: "listConversations" }, idToken); }
    async loadConversation(idToken, conversationId) { return this.request({ action: "loadConversation", conversationId }, idToken); }
}


        const DEFAULT_BASE_URL = "https://royal-surf-f8bc.s02204-hill.workers.dev";
        const DEFAULT_API_KEY = "";

        const Character2D = ({ isTalking }) => {
            const [blink, setBlink] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    setBlink(true);
                    setTimeout(() => setBlink(false), 150);

                return () => clearInterval(interval);
            }, []);

            const avatarBase = "https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Avatar.png";
            const avatarEyeClose = "https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Avatar_Eye_Close.png";
            const avatarMouthOpen = "https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Avatar_Mouth_Open.png";

            return (

                                    className="absolute inset-0 w-full h-full object-contain select-none pointer-events-none"

                                />

            );

        function App() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [chatMemory, setChatMemory] = useState([]);
            const [geminiChatId, setGeminiChatId] = useState(() => localStorage.getItem("CORA_GEMINIDATA_CHAT_ID") || null);
            const [currentUser, setCurrentUser] = useState(null);
            const [idToken, setIdToken] = useState(null);
            const [historyOpen, setHistoryOpen] = useState(false);
            const [savedChats, setSavedChats] = useState([]);
            const [activeSavedChatId, setActiveSavedChatId] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isTalking, setIsTalking] = useState(false);
            const [audioEnabled, setAudioEnabled] = useState(true);
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
            
            
            
            const [stagedImages, setStagedImages] = useState([]);
            const [medicationInfo, setMedicationInfo] = useState(null);
            const [isListening, setIsListening] = useState(false);

            const scrollRef = useRef(null);
            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);
            const recognitionRef = useRef(null);
            const sendingRef = useRef(false);

            const client = useMemo(() => new OpenAI("https://royal-surf-f8bc.s02204-hill.workers.dev"), []);

            useEffect(() => {
                const root = window.document.documentElement;
                if (theme === 'dark') root.classList.add('dark');
                else root.classList.remove('dark');
                localStorage.setItem('theme', theme);
            }, [theme]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            useEffect(() => {
                const greetingText = "Hi，我是 Cora！我是您的 AI 藥師助手。我可以幫您解說藥物成分、適應症與副作用，讓用藥更安心。請問今天有什麼我可以幫您的嗎？";
                setMessages([{ id: "greeting", role: "assistant", content: greetingText }]);
                setTimeout(() => speakLocal(greetingText), 1000);

                // Initialize Speech Recognition
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = 'zh-TW';
                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setInput(transcript);
                        setTimeout(() => handleSend(transcript), 500);
                    };
                    recognition.onend = () => setIsListening(false);
                    recognition.onerror = () => setIsListening(false);
                    recognitionRef.current = recognition;
                }
            }, []);


            useEffect(() => {
                if (!firebaseReady || !auth) return;
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    setCurrentUser(user || null);
                    if (user) {
                        const token = await user.getIdToken();
                        setIdToken(token);
                        await loadCloudHistory(token);
                    } else {
                        setIdToken(null);
                        setSavedChats([]);
                        setActiveSavedChatId(null);
                        setHistoryOpen(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const signInWithGoogle = async () => {
                if (!firebaseReady || !auth) {
                    alert("尚未設定 Firebase。請先填入 firebaseConfig，並啟用 Google 登入。");
                    return;
                }
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const signOutGoogle = async () => {
                if (!auth) return;
                await auth.signOut();
            };

            const getFreshIdToken = async () => {
                if (!auth?.currentUser) return null;
                const token = await auth.currentUser.getIdToken(true);
                setIdToken(token);
                return token;
            };

            const loadCloudHistory = async (token = idToken) => {
                if (!token) return;
                try {
                    const data = await client.listConversations(token);
                    setSavedChats(data.conversations || []);
                } catch (err) {
                    console.warn("讀取雲端對話失敗：", err);
                }
            };

            const loadConversation = async (chat) => {
                const token = idToken || await getFreshIdToken();
                if (!token) return;
                try {
                    const data = await client.loadConversation(token, chat.id);
                    const c = data.conversation || chat;
                    setMessages(c.messages || []);
                    setChatMemory(c.chatMemory || []);
                    setMedicationInfo(c.medicationInfo || null);
                    setActiveSavedChatId(c.id || chat.id || null);
                    if (c.geminiChatId) {
                        setGeminiChatId(c.geminiChatId);
                        localStorage.setItem("CORA_GEMINIDATA_CHAT_ID", c.geminiChatId);
                    }
                    setHistoryOpen(false);
                } catch (err) {
                    console.warn("載入對話失敗：", err);
                }
            };

            const startNewConversation = () => {
                localStorage.removeItem("CORA_GEMINIDATA_CHAT_ID");
                setGeminiChatId(null);
                setChatMemory([]);
                setMedicationInfo(null);
                setActiveSavedChatId(null);
                setMessages([{ id: "greeting-new", role: "assistant", content: "已開啟新的對話，請問今天想查詢哪一種藥物？" }]);
            };

            const speakLocal = (text) => {
                if (!('speechSynthesis' in window) || !audioEnabled) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.onstart = () => setIsTalking(true);
                utterance.onend = () => setIsTalking(false);
                utterance.onerror = () => setIsTalking(false);
                window.speechSynthesis.speak(utterance);
            };

            const notifyReply = () => {
                // Android 通常可用；iPhone Safari 對震動 API 支援較有限，PWA 或部分瀏覽器可能有效。
                if (navigator.vibrate) {
                    navigator.vibrate([80, 40, 80]);
                }
            };

            const startListening = () => {
                if (recognitionRef.current && !isListening) {
                    recognitionRef.current.start();
                    setIsListening(true);
                } else if (isListening) {
                    recognitionRef.current?.stop();
                }
            };

            const handleFileChange = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                const newStaged = [...stagedImages];
                for (let file of files) {
                    const dataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    newStaged.push({ data: dataUrl });
                }
                setStagedImages(newStaged);
                e.target.value = "";
            };

            const handleSend = async (overrideInput) => {
                const currentInput = overrideInput || input;
                if (sendingRef.current || loading || (!currentInput.trim() && stagedImages.length === 0)) return;
                sendingRef.current = true;

                const text = currentInput.trim() || "請協助分析這些藥物相關圖片。";
                const currentImages = stagedImages.map(img => img.data);
                
                setInput("");
                setStagedImages([]);
                
                const userMessage = { id: Date.now().toString(), role: "user", content: text, images: currentImages };
                setMessages(prev => [...prev, userMessage]);
                const currentMemory = [...chatMemory, { role: "user", content: text }].slice(-10);
                setChatMemory(currentMemory);
                setLoading(true);

                try {
                    const systemPrompt = `你是一位名叫 Cora 的專業且親切的藥劑師助手，回答要自然、簡潔、像真人藥師聊天。請以 JSON 格式回傳：{"answer": "口語解釋", "ingredients": [], "indications": [], "side_effects": [], "warnings": [], "reference_image_query": "搜尋關鍵字"}。使用繁體中文。`;
                    
                    const history = [...messages, userMessage].slice(-6).map(msg => {
                        let content = msg.content;
                        if (msg.images && msg.images.length > 0) {
                            content = [{ type: "text", text: msg.content }];
                            msg.images.forEach(url => content.push({ type: "image_url", image_url: { url } }));
                        }
                        return { role: msg.role, content };
                    });

                    const response = await client.ask(text, currentMemory, geminiChatId, idToken, activeSavedChatId, currentImages);

                    if (response.chatId && response.chatId !== geminiChatId) {
                        setGeminiChatId(response.chatId);
                        localStorage.setItem("CORA_GEMINIDATA_CHAT_ID", response.chatId);
                    }

                    if (response.conversationId && response.conversationId !== activeSavedChatId) {
                        setActiveSavedChatId(response.conversationId);
                    }

                    const aiText =
                        response.result ||
                        response.response ||
                        response.answer ||
                        response.message ||
                        (response.rawLLM && response.rawLLM.choices && response.rawLLM.choices[0] && response.rawLLM.choices[0].message && response.rawLLM.choices[0].message.content) ||
                        "目前沒有取得回答";

                    const drugCard =
                        response.drugCard ||
                        response.drug_card ||
                        response.card ||
                        null;

                    let info;

                    try {
                        info = JSON.parse(aiText);
                    } catch {
                        info = {
                            answer: aiText,
                            ingredients: drugCard?.ingredients || drugCard?.ingredient || [],
                            indications: drugCard?.indications || drugCard?.indication || [],
                            side_effects: drugCard?.side_effects || drugCard?.sideEffects || drugCard?.side_effect || [],
                            warnings: drugCard?.warnings || drugCard?.warning || drugCard?.contraindications || [],
                            reference_image_query: drugCard?.reference_image_query || ""
                        };
                    }

                    const toArray = (value) => {
                        if (!value) return [];
                        if (Array.isArray(value)) return value.filter(Boolean);
                        return String(value)
                            .split(/\n|、|;|；/)
                            .map(item => item.trim())
                            .filter(Boolean);
                    };

                    info.ingredients = toArray(info.ingredients);
                    info.indications = toArray(info.indications);
                    info.side_effects = toArray(info.side_effects);
                    info.warnings = toArray(info.warnings);
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: "assistant",
                        content: info.answer,
                        medicationInfo: info
                    };

                    setMessages(prev => [...prev, assistantMessage]);
                    setMedicationInfo(info);
                    setChatMemory(prev => [...prev, { role: "assistant", content: info.answer }].slice(-10));
                    notifyReply();
                    speakLocal(info.answer);
                } catch (err) {
                    console.error(err);
                    const errorText = "抱歉，我暫時無法取得該藥物的資訊。請稍後再試。";
                    setMessages(prev => [...prev, { id: Date.now().toString(), role: "assistant", content: errorText }]);
                    notifyReply();
                    speakLocal(errorText);
                } finally {
                    setLoading(false);
                    sendingRef.current = false;
                }
            };

            return (
                <div className="min-h-screen flex flex-col text-slate-900 dark:text-slate-100 transition-colors duration-300">

                    {previewImage && (
                        <div
                            onClick={() => setPreviewImage(null)}
                            className="fixed inset-0 bg-black/85 z-[100000] flex items-center justify-center p-4 cursor-zoom-out"
                        >
                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    setPreviewImage(null);
                                }}
                                className="absolute top-4 right-4 w-11 h-11 rounded-full bg-white/15 hover:bg-white/25 text-white flex items-center justify-center text-2xl"
                                aria-label="關閉圖片預覽"
                            >
                                ×
                            </button>
                            <img
                                src={previewImage}
                                className="max-w-full max-h-full rounded-2xl shadow-2xl object-contain"
                                onClick={(e) => e.stopPropagation()}
                                alt="圖片預覽"
                            />
                        </div>
                    )}


                    {historyOpen && currentUser && (
                        <div className="cora-history-backdrop" onClick={() => setHistoryOpen(false)}></div>
                    )}

                    <aside className={`cora-history-drawer ${historyOpen && currentUser ? "open" : ""} bg-[#F8F1E7] dark:bg-slate-900 border-r border-[#D8CBB5] dark:border-slate-800 shadow-2xl p-4 flex flex-col`}>
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-2 min-w-0">
                                <img src={currentUser?.photoURL || "https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Apple_Icon.png"} className="w-9 h-9 rounded-full object-cover" referrerPolicy="no-referrer" />
                                <div className="min-w-0">
                                    <p className="text-sm font-bold truncate">{currentUser?.displayName || "Google 使用者"}</p>
                                    <p className="text-[10px] text-slate-500 truncate">個人對話歷史</p>
                                </div>
                            </div>
                            <button onClick={() => setHistoryOpen(false)} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800">
                                ✕
                            </button>
                        </div>

                        <button
                            onClick={startNewConversation}
                            className="mb-4 w-full py-2 rounded-xl bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold transition-colors"
                        >
                            + 新對話
                        </button>

                        <div className="flex-1 overflow-y-auto space-y-2">
                            {savedChats.length === 0 && (
                                <div className="text-xs text-slate-500 p-3 rounded-xl bg-slate-100 dark:bg-slate-800">
                                    尚無雲端對話紀錄。
                                </div>
                            )}

                            {savedChats.map(chat => (
                                <button
                                    key={chat.id}
                                    onClick={() => loadConversation(chat)}
                                    className={`w-full text-left p-3 rounded-xl border text-sm transition-colors ${activeSavedChatId === chat.id ? "bg-cyan-500/15 border-cyan-400 text-cyan-600" : "bg-white/60 dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700"}`}
                                >
                                    <div className="font-semibold truncate">{chat.title || "未命名對話"}</div>
                                    <div className="text-[10px] text-slate-500 mt-1">{chat.messages?.length || 0} 則訊息</div>
                                </button>
                            ))}
                        </div>

                        <div className="pt-4 border-t border-slate-200 dark:border-slate-700 mt-4">
                            <button
                                onClick={signOutGoogle}
                                className="w-full py-2 rounded-xl bg-red-500 hover:bg-red-600 text-white text-sm font-semibold transition-colors"
                            >
                                登出 Google 帳號
                            </button>
                        </div>
                    </aside>

                    <header className="bg-[#F8F1E7] dark:bg-slate-900 border-b border-[#D8CBB5] dark:border-slate-800 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">

<div className="bg-transparent w-12 h-12 shrink-0 flex items-center justify-center rounded-2xl overflow-hidden">
