<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORA AI 藥物解說系統 - 完整功能版</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Tailwind Config for Dark Mode */
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Icon Fixes */
        .inline-flex svg { display: block; transform: none !important; }
        
        /* Animation Keyframes */
        @keyframes pulse-teal {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .animate-pulse-teal { animation: pulse-teal 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Lucide Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Convert kebab-case to PascalCase for Lucide CDN icons
                    const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                    
                    // Try to find the icon in lucide.icons or lucide directly
                    const icon = (lucide.icons && lucide.icons[pascalName]) || 
                                 (lucide.icons && lucide.icons[name]) || 
                                 lucide[pascalName] || 
                                 lucide[name] || 
                                 (lucide.icons && lucide.icons['HelpCircle']) || 
                                 lucide['HelpCircle'];
                    
                    if (icon && typeof icon.toSvg === 'function') {
                        iconRef.current.innerHTML = icon.toSvg({
                            'stroke-width': 2,
                            'width': size,
                            'height': size,
                            'class': className
                        });
                    } else {
                        console.warn(`Icon not found: ${name}`);
                        // Final fallback: try to use createIcons if direct access fails
                        iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        if (typeof lucide.createIcons === 'function') {
                            lucide.createIcons();
                        }
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }} />;
        };

        // --- OpenAI SDK Mini Implementation ---
        class OpenAI {
            constructor({ apiKey, baseURL }) {
                this.apiKey = apiKey;
                this.baseURL = baseURL;
            }
            async chat(params) {
                const response = await fetch(`${this.baseURL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.apiKey}`
                    },
                    body: JSON.stringify(params)
                });
                if (!response.ok) throw new Error('API Error');
                return await response.json();
            }
        }

        const DEFAULT_BASE_URL = "https://free.v36.cm/v1";
        const DEFAULT_API_KEY = "sk-70MU4HQPL29819H4E0144d9dC19d4976A03720Ca5aDdD130";

        // --- Components ---

        const Character2D = ({ isTalking }) => {
            const [blink, setBlink] = useState(false);
            useEffect(() => {
                const interval = setInterval(() => {
                    setBlink(true);
                    setTimeout(() => setBlink(false), 150);
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="relative w-full h-full flex items-center justify-center overflow-hidden bg-teal-50/30 dark:bg-slate-900/50 rounded-3xl transition-colors duration-300">
                    <motion.div
                        animate={{ y: [0, -6, 0] }}
                        transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}
                        className="relative w-full h-full max-w-[280px] max-h-[380px] flex items-center justify-center"
                    >
                        <svg viewBox="0 0 200 240" className="w-full h-full drop-shadow-lg">
                            <defs>
                                <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stopColor="#5D4037" />
                                    <stop offset="100%" stopColor="#3E2723" />
                                </linearGradient>
                            </defs>
                            <path d="M25 90 Q10 150 40 190 Q100 210 160 190 Q190 150 175 90 Q100 -10 25 90 Z" fill="url(#hairGrad)" />
                            <path d="M50 180 Q100 165 150 180 L165 240 L35 240 Z" fill="#B2DFDB" />
                            <path d="M80 180 L100 205 L120 180" fill="white" />
                            <path d="M75 185 Q75 210 100 215 Q125 210 125 185" fill="none" stroke="#546E7A" strokeWidth="3" strokeLinecap="round" />
                            <circle cx="100" cy="225" r="6" fill="#78909C" />
                            <rect x="90" y="165" width="20" height="15" fill="#FFE0BD" />
                            <path d="M45 85 Q100 35 155 85 Q165 150 100 185 Q35 150 45 85" fill="#FFE0BD" />
                            <path d="M35 90 Q100 5 165 90 Q170 115 140 115 Q100 95 60 115 Q30 115 35 90" fill="url(#hairGrad)" />
                            <path d="M35 95 Q25 135 45 165" fill="none" stroke="url(#hairGrad)" strokeWidth="12" strokeLinecap="round" />
                            <path d="M165 95 Q175 135 155 165" fill="none" stroke="url(#hairGrad)" strokeWidth="12" strokeLinecap="round" />
                            <g transform="translate(75, 125)">
                                {blink ? (
                                    <path d="M-12 0 Q0 6 12 0" fill="none" stroke="#333" strokeWidth="4" strokeLinecap="round" />
                                ) : (
                                    <React.Fragment>
                                        <circle cx="0" cy="0" r="12" fill="#333" />
                                        <circle cx="4" cy="-4" r="4" fill="white" />
                                        <circle cx="-3" cy="3" r="2" fill="white" opacity="0.6" />
                                    </React.Fragment>
                                )}
                            </g>
                            <g transform="translate(125, 125)">
                                {blink ? (
                                    <path d="M-12 0 Q0 6 12 0" fill="none" stroke="#333" strokeWidth="4" strokeLinecap="round" />
                                ) : (
                                    <React.Fragment>
                                        <circle cx="0" cy="0" r="12" fill="#333" />
                                        <circle cx="4" cy="-4" r="4" fill="white" />
                                        <circle cx="-3" cy="3" r="2" fill="white" opacity="0.6" />
                                    </React.Fragment>
                                )}
                            </g>
                            <path d="M60 105 Q75 95 90 105" fill="none" stroke="#5D4037" strokeWidth="2.5" strokeLinecap="round" />
                            <path d="M110 105 Q125 95 140 105" fill="none" stroke="#5D4037" strokeWidth="2.5" strokeLinecap="round" />
                            <motion.path
                                initial={{ d: "M85 155 Q100 175 115 155 Q100 175 85 155 Z" }}
                                animate={isTalking ? {
                                    d: [
                                        "M85 155 Q100 175 115 155 Q100 185 85 155 Z",
                                        "M85 155 Q100 165 115 155 Q100 175 85 155 Z",
                                        "M85 155 Q100 175 115 155 Q100 185 85 155 Z"
                                    ]
                                } : { d: "M85 155 Q100 175 115 155 Q100 175 85 155 Z" }}
                                transition={isTalking ? { duration: 0.4, repeat: Infinity, ease: "easeInOut" } : { duration: 0.3 }}
                                fill="#000000"
                                stroke="#000000"
                                strokeWidth="1"
                            />
                        </svg>
                    </motion.div>
                </div>
            );
        };

        function App() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isTalking, setIsTalking] = useState(false);
            const [audioEnabled, setAudioEnabled] = useState(true);
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
            const [showSettings, setShowSettings] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('OPENAI_API_KEY') || "");
            const [baseUrl, setBaseUrl] = useState(localStorage.getItem('OPENAI_BASE_URL') || DEFAULT_BASE_URL);
            const [stagedImages, setStagedImages] = useState([]);
            const [medicationInfo, setMedicationInfo] = useState(null);
            const [isListening, setIsListening] = useState(false);

            const scrollRef = useRef(null);
            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);
            const recognitionRef = useRef(null);

            const client = useMemo(() => new OpenAI({
                apiKey: apiKey || DEFAULT_API_KEY,
                baseURL: baseUrl || DEFAULT_BASE_URL
            }), [apiKey, baseUrl]);

            useEffect(() => {
                const root = window.document.documentElement;
                if (theme === 'dark') root.classList.add('dark');
                else root.classList.remove('dark');
                localStorage.setItem('theme', theme);
            }, [theme]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            useEffect(() => {
                const greetingText = "Hi，我是 Cora！我是您的 AI 藥師助手。我可以幫您解說藥物成分、適應症與副作用，讓用藥更安心。請問今天有什麼我可以幫您的嗎？";
                setMessages([{ id: "greeting", role: "assistant", content: greetingText }]);
                setTimeout(() => speakLocal(greetingText), 1000);

                // Initialize Speech Recognition
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = 'zh-TW';
                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setInput(transcript);
                        setTimeout(() => handleSend(transcript), 500);
                    };
                    recognition.onend = () => setIsListening(false);
                    recognition.onerror = () => setIsListening(false);
                    recognitionRef.current = recognition;
                }
            }, []);

            const speakLocal = (text) => {
                if (!('speechSynthesis' in window) || !audioEnabled) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.onstart = () => setIsTalking(true);
                utterance.onend = () => setIsTalking(false);
                utterance.onerror = () => setIsTalking(false);
                window.speechSynthesis.speak(utterance);
            };

            const startListening = () => {
                if (recognitionRef.current && !isListening) {
                    recognitionRef.current.start();
                    setIsListening(true);
                } else if (isListening) {
                    recognitionRef.current?.stop();
                }
            };

            const handleFileChange = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                const newStaged = [...stagedImages];
                for (let file of files) {
                    const dataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    newStaged.push({ data: dataUrl });
                }
                setStagedImages(newStaged);
                e.target.value = "";
            };

            const handleSend = async (overrideInput) => {
                const currentInput = overrideInput || input;
                if ((!currentInput.trim() && stagedImages.length === 0) || loading) return;

                const text = currentInput.trim() || "請協助分析這些藥物相關圖片。";
                const currentImages = stagedImages.map(img => img.data);
                
                setInput("");
                setStagedImages([]);
                
                const userMessage = { id: Date.now().toString(), role: "user", content: text, images: currentImages };
                setMessages(prev => [...prev, userMessage]);
                setLoading(true);

                try {
                    const systemPrompt = `你是一位名叫 Cora 的專業且親切的藥劑師助手。請以 JSON 格式回傳：{"answer": "口語解釋", "ingredients": [], "indications": [], "side_effects": [], "warnings": [], "reference_image_query": "搜尋關鍵字"}。使用繁體中文。`;
                    
                    const history = [...messages, userMessage].slice(-6).map(msg => {
                        let content = msg.content;
                        if (msg.images && msg.images.length > 0) {
                            content = [{ type: "text", text: msg.content }];
                            msg.images.forEach(url => content.push({ type: "image_url", image_url: { url } }));
                        }
                        return { role: msg.role, content };
                    });

                    const response = await client.chat({
                        model: "gpt-4o-mini",
                        messages: [{ role: "system", content: systemPrompt }, ...history],
                        response_format: { type: "json_object" }
                    });

                    const info = JSON.parse(response.choices[0].message.content);
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: "assistant",
                        content: info.answer,
                        medicationInfo: info
                    };

                    setMessages(prev => [...prev, assistantMessage]);
                    setMedicationInfo(info);
                    speakLocal(info.answer);
                } catch (err) {
                    console.error(err);
                    const errorText = "抱歉，我暫時無法取得該藥物的資訊。請稍後再試。";
                    setMessages(prev => [...prev, { id: Date.now().toString(), role: "assistant", content: errorText }]);
                    speakLocal(errorText);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col text-slate-900 dark:text-slate-100 transition-colors duration-300">
                    <header className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-teal-500 p-2 rounded-xl shadow-sm">
                                <Icon name="pill" className="text-white" size={24} />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight">CORA AI 藥物解說系統</h1>
                                <p className="text-[10px] text-slate-500 dark:text-slate-400 font-medium">專業衛教助手 · 完整功能版</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setTheme(theme === "light" ? "dark" : "light")} className="p-2 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                <Icon name={theme === "light" ? "moon" : "sun"} size={20} />
                            </button>
                            <button onClick={() => setAudioEnabled(!audioEnabled)} className={`p-2 rounded-full transition-colors ${audioEnabled ? 'bg-teal-50 dark:bg-teal-900/30 text-teal-600' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>
                                <Icon name={audioEnabled ? "volume-2" : "volume-x"} size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 flex flex-col gap-4 h-[300px] lg:h-auto">
                            <Character2D isTalking={isTalking} />
                            <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm hidden md:block">
                                <p className="text-sm text-slate-600 dark:text-slate-400 leading-relaxed italic">
                                    「Hi，我是 Cora！您可以詢問我任何關於藥物的問題，我會盡力為您解答。」
                                </p>
                            </div>
                        </div>

                        <div className="lg:col-span-8 flex flex-col gap-6 h-full">
                            <div className="flex-1 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col overflow-hidden min-h-[400px]">
                                <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-4 scroll-smooth">
                                    {messages.map((msg) => (
                                        <motion.div key={msg.id} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className={`flex gap-3 max-w-[85%] ${msg.role === "user" ? "ml-auto flex-row-reverse" : "mr-auto"}`}>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 shadow-sm ${msg.role === "user" ? "bg-teal-100 text-teal-600" : "bg-slate-100 dark:bg-slate-800 text-slate-600"}`}>
                                                <Icon name={msg.role === "user" ? "user" : "bot"} size={16} />
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                {msg.images && msg.images.length > 0 && (
                                                    <div className={`flex flex-wrap gap-2 ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
                                                        {msg.images.map((img, idx) => (
                                                            <div key={idx} className="max-w-[120px] rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm">
                                                                <img src={img} className="w-full h-auto object-cover" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                <div className={`p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${msg.role === "user" ? "bg-teal-600 text-white rounded-tr-none" : "bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-tl-none"}`}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        </motion.div>
                                    ))}
                                    {loading && (
                                        <div className="flex gap-3 mr-auto">
                                            <div className="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center animate-pulse">
                                                <Icon name="bot" size={16} className="text-slate-400" />
                                            </div>
                                            <div className="bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl rounded-tl-none flex items-center gap-2 shadow-sm">
                                                <Icon name="loader-2" size={16} className="text-teal-600" />
                                                <span className="text-sm text-slate-500 dark:text-slate-400 font-medium">Cora 正在查閱資料...</span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
                                    <div className="relative flex flex-col gap-2">
                                        {stagedImages.length > 0 && (
                                            <div className="flex flex-wrap gap-2 p-2 bg-teal-50 dark:bg-teal-950/30 rounded-xl border border-teal-100 dark:border-teal-900/50">
                                                {stagedImages.map((img, idx) => (
                                                    <div key={idx} className="relative w-12 h-12 rounded-lg overflow-hidden border border-teal-200 dark:border-teal-800 shrink-0">
                                                        <img src={img.data} className="w-full h-full object-cover" />
                                                        <button onClick={() => setStagedImages(prev => prev.filter((_, i) => i !== idx))} className="absolute top-0 right-0 bg-teal-600 text-white p-0.5 rounded-bl-lg hover:bg-teal-700">
                                                            <Icon name="x" size={10} />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <div className="flex items-center gap-2">
                                            <button onClick={startListening} className={`p-3 rounded-2xl transition-all shadow-sm border ${isListening ? 'bg-teal-600 border-teal-600 text-white animate-pulse' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 hover:text-teal-600'}`}>
                                                <Icon name="mic" size={20} />
                                            </button>
                                            <button onClick={() => cameraInputRef.current?.click()} className="p-3 rounded-2xl transition-all shadow-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-teal-600">
                                                <Icon name="camera" size={20} />
                                            </button>
                                            <button onClick={() => fileInputRef.current?.click()} className="p-3 rounded-2xl transition-all shadow-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-teal-600">
                                                <Icon name="image" size={20} />
                                            </button>
                                            <div className="relative flex-1">
                                                <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" multiple onChange={handleFileChange} className="hidden" />
                                                <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleFileChange} className="hidden" />
                                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === "Enter" && handleSend()} placeholder="詢問藥物資訊..." className="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl py-3 pl-4 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all shadow-sm" />
                                                <button onClick={() => handleSend()} disabled={loading} className="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-teal-600 text-white rounded-xl hover:bg-teal-700 disabled:opacity-50 transition-colors shadow-sm">
                                                    <Icon name="send" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <AnimatePresence>
                                {medicationInfo && (
                                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 20 }} className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl overflow-hidden">
                                        <div className="bg-teal-600 px-6 py-3 flex items-center justify-between">
                                            <div className="flex items-center gap-2 text-white">
                                                <Icon name="info" size={20} />
                                                <h2 className="font-semibold">藥物詳細資訊卡</h2>
                                            </div>
                                            {medicationInfo.reference_image_query && (
                                                <a href={`https://www.google.com/search?q=${encodeURIComponent(medicationInfo.reference_image_query)}&tbm=isch`} target="_blank" className="flex items-center gap-1 text-xs bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-xl transition-colors">
                                                    <Icon name="search" size={12} />
                                                    <span>查看參考圖片</span>
                                                    <Icon name="external-link" size={10} />
                                                </a>
                                            )}
                                        </div>
                                        <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2 bg-teal-50/30 dark:bg-teal-900/10 p-4 rounded-2xl border border-teal-100/50">
                                                <div className="flex items-center gap-2 text-teal-600 font-bold text-sm">
                                                    <Icon name="pill" size={16} />
                                                    <h3>主要成分</h3>
                                                </div>
                                                <ul className="list-disc list-inside text-xs text-slate-600 dark:text-slate-400 space-y-1">
                                                    {medicationInfo.ingredients.map((item, idx) => <li key={idx}>{item}</li>)}
                                                </ul>
                                            </div>
                                            <div className="space-y-2 bg-emerald-50/30 dark:bg-emerald-900/10 p-4 rounded-2xl border border-emerald-100/50">
                                                <div className="flex items-center gap-2 text-emerald-600 font-bold text-sm">
                                                    <Icon name="shield-alert" size={16} />
                                                    <h3>適應症</h3>
                                                </div>
                                                <ul className="list-disc list-inside text-xs text-slate-600 dark:text-slate-400 space-y-1">
                                                    {medicationInfo.indications.map((item, idx) => <li key={idx}>{item}</li>)}
                                                </ul>
                                            </div>
                                            <div className="space-y-2 bg-amber-50/30 dark:bg-amber-900/10 p-4 rounded-2xl border border-amber-100/50">
                                                <div className="flex items-center gap-2 text-amber-600 font-bold text-sm">
                                                    <Icon name="triangle-alert" size={16} />
                                                    <h3>常見副作用</h3>
                                                </div>
                                                <ul className="list-disc list-inside text-xs text-slate-600 dark:text-slate-400 space-y-1">
                                                    {medicationInfo.side_effects.map((item, idx) => <li key={idx}>{item}</li>)}
                                                </ul>
                                            </div>
                                            <div className="space-y-2 bg-red-50/30 dark:bg-red-900/10 p-4 rounded-2xl border border-red-100/50">
                                                <div className="flex items-center gap-2 text-red-600 font-bold text-sm">
                                                    <Icon name="shield-alert" size={16} />
                                                    <h3>禁忌與注意事項</h3>
                                                </div>
                                                <ul className="list-disc list-inside text-xs text-slate-600 dark:text-slate-400 space-y-1">
                                                    {medicationInfo.warnings.map((item, idx) => <li key={idx}>{item}</li>)}
                                                </ul>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="settings" className="text-teal-500" />系統設定</h3>
                                    <button onClick={() => setShowSettings(false)}><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">OpenAI API Key</label>
                                        <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-..." className="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 outline-none focus:ring-2 focus:ring-teal-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">API 代理網址 (Base URL)</label>
                                        <input type="text" value={baseUrl} onChange={(e) => setBaseUrl(e.target.value)} placeholder="https://..." className="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 outline-none focus:ring-2 focus:ring-teal-500" />
                                    </div>
                                    <button onClick={() => { localStorage.setItem('OPENAI_API_KEY', apiKey); localStorage.setItem('OPENAI_BASE_URL', baseUrl); setShowSettings(false); }} className="w-full py-3 bg-teal-500 hover:bg-teal-600 text-white font-bold rounded-xl shadow-lg transition-all">儲存設定</button>
                                </div>
                            </motion.div>
                        </div>
                    )}

                    <footer className="py-4 text-center text-slate-400 text-[10px]">
                        © 2026 CORA AI 藥物解說系統 · 本系統僅供參考，請務必諮詢醫師或藥師
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
