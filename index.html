<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>CORA AI 藥物解說系統</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Apple_Icon.png" />
	<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mixcyanx/CORA-AI-SYSTEM/refs/heads/main/Icon.png" />
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    
    <script>
        // Custom Tailwind Config for Dark Mode
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            /* Light mode: keep CORA's original warm beige feeling */
            --gpt-bg: #F5EFE6;
            --gpt-surface: #F8F1E7;
            --gpt-surface-2: #EADFCC;
            --gpt-sidebar: #efe4d2;
            --gpt-sidebar-hover: #e3d4bd;
            --gpt-text: #211b14;
            --gpt-muted: #766b5c;
            --gpt-border: rgba(94, 75, 52, 0.18);
            --gpt-input: #F8F1E7;
            --gpt-accent: #0f766e;
            --gpt-accent-text: #ffffff;
        }
        .dark {
            /* Dark mode: deep blue instead of flat black/gray */
            --gpt-bg: #081425;
            --gpt-surface: #0e1e33;
            --gpt-surface-2: #162a45;
            --gpt-sidebar: #07111f;
            --gpt-sidebar-hover: #13243a;
            --gpt-text: #eef6ff;
            --gpt-muted: #9fb2c8;
            --gpt-border: rgba(180, 210, 255, 0.16);
            --gpt-input: #102238;
            --gpt-accent: #6bb7ff;
            --gpt-accent-text: #06101e;
        }
        html, body, #root { min-height: 100%; }
        body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--gpt-bg); color: var(--gpt-text); }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(127,127,127,.35); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(127,127,127,.55); }
        .inline-flex svg { display:block; transform:none!important; }
        .gpt-shell { min-height: 100vh; display: flex; background: var(--gpt-bg); color: var(--gpt-text); }
        .gpt-sidebar { width: 260px; min-width: 260px; background: var(--gpt-sidebar); color: var(--gpt-text); display:flex; flex-direction:column; padding: 8px; border-right: 1px solid rgba(255,255,255,.06); }
        .gpt-sidebar-top { display:flex; align-items:center; gap:8px; min-height:48px; padding: 4px 6px 10px; }
        .gpt-new-chat { width:100%; display:flex; align-items:center; gap:10px; padding: 10px 12px; border-radius:10px; color:var(--gpt-text); background:transparent; border:0; cursor:pointer; font-size:14px; text-align:left; }
        .gpt-new-chat:hover, .gpt-history-row:hover, .gpt-icon-btn-dark:hover { background: var(--gpt-sidebar-hover); }
        .gpt-history-list { flex:1; overflow-y:auto; padding: 6px 0; }
        .gpt-history-section-title { padding: 12px 12px 6px; font-size:12px; color:#9b9b9b; }
        .gpt-history-row { display:flex; align-items:center; min-height:36px; border-radius:10px; transition:.12s background; color:var(--gpt-text); }
        .gpt-history-row.active { background:var(--gpt-sidebar-hover); }
        .gpt-history-main { flex:1; min-width:0; padding: 9px 12px; border:0; background:transparent; color:inherit; text-align:left; cursor:pointer; }
        .gpt-history-title { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .gpt-delete-btn { opacity:0; width:30px; height:30px; margin-right:4px; border:1px solid transparent; border-radius:10px; background:transparent; color:var(--gpt-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition: opacity .12s ease, background .12s ease, color .12s ease, border-color .12s ease; }
        .gpt-history-row:hover .gpt-delete-btn { opacity:1; }
        .gpt-delete-btn:hover { background:rgba(239,68,68,.14); color:#ef4444; border-color:rgba(239,68,68,.28); }
        .gpt-delete-btn svg { width:16px; height:16px; }
        .gpt-sidebar-footer { border-top:1px solid rgba(255,255,255,.10); padding-top:8px; }
        .gpt-user-card { width:100%; display:flex; align-items:center; gap:10px; padding:10px 8px; border:0; border-radius:10px; background:transparent; color:#ececec; cursor:pointer; text-align:left; }
        .gpt-user-card:hover { background: var(--gpt-sidebar-hover); }
        .gpt-main { flex:1; min-width:0; display:flex; flex-direction:column; height:100vh; position:relative; background:var(--gpt-bg); }
        .gpt-topbar { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; border-bottom:1px solid transparent; }
        .gpt-title { font-size:18px; font-weight:600; letter-spacing:-.02em; }
        .gpt-subtitle { font-size:12px; color:var(--gpt-muted); margin-top:1px; }
        .gpt-icon-btn, .gpt-icon-btn-dark { width:38px; height:38px; border:0; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.12s background; }
        .gpt-icon-btn { background:transparent; color:var(--gpt-text); }
        .gpt-input-row .gpt-icon-btn { width:34px; height:34px; border-radius:50%; }
        .gpt-icon-btn:hover { background:var(--gpt-surface-2); }
        .gpt-icon-btn-dark { background:transparent; color:#ececec; }
        .gpt-chat { flex:1; overflow-y:auto; padding: 16px 0 176px; scroll-behavior:smooth; }
        .gpt-message-row { width:100%; padding: 18px 20px; }
        .gpt-message-inner { max-width: 760px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; }
        .gpt-avatar { width:28px; height:28px; border-radius:50%; overflow:hidden; flex:0 0 28px; display:flex; align-items:center; justify-content:center; background:var(--gpt-surface-2); color:var(--gpt-text); }
        .gpt-avatar.assistant { background:var(--gpt-accent); color:var(--gpt-accent-text); }
        .gpt-bubble { flex:1; min-width:0; font-size:15px; line-height:1.75; white-space:pre-wrap; color:var(--gpt-text); }
        .gpt-user-row .gpt-message-inner { flex-direction:row-reverse; }
        .gpt-user-bubble { max-width:70%; background:var(--gpt-surface-2); padding:10px 16px; border-radius:22px; line-height:1.65; }
        .gpt-images { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
        .gpt-image-thumb { max-width:160px; border-radius:14px; overflow:hidden; border:1px solid var(--gpt-border); cursor:zoom-in; }
        .gpt-composer-wrap { position:absolute; left:0; right:0; bottom:0; padding: 12px 20px 18px; background: linear-gradient(to top, var(--gpt-bg) 78%, transparent); }
        .gpt-composer { max-width:760px; margin:0 auto; border:1px solid var(--gpt-border); background:var(--gpt-input); border-radius:26px; box-shadow:0 2px 12px rgba(0,0,0,.08); padding:6px 8px; }
        .gpt-staged { display:flex; flex-wrap:wrap; gap:8px; padding:4px 6px 8px; }
        .gpt-staged-item { position:relative; width:54px; height:54px; border-radius:12px; overflow:hidden; border:1px solid var(--gpt-border); }
        .gpt-staged-remove { position:absolute; top:3px; right:3px; width:18px; height:18px; border:0; border-radius:50%; background:rgba(0,0,0,.75); color:white; display:flex; align-items:center; justify-content:center; }
        .gpt-input-row { display:flex; align-items:center; gap:6px; min-height:40px; }
        .gpt-text-input { flex:1; height:40px; min-height:40px; border:0; outline:0; background:transparent; color:var(--gpt-text); font-size:15px; padding: 0 6px; }
        .gpt-send { width:34px; height:34px; flex:0 0 34px; border:0; border-radius:50%; background:var(--gpt-text); color:var(--gpt-bg); display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .gpt-send:disabled { opacity:.35; cursor:not-allowed; }
        .gpt-disclaimer { max-width:760px; margin:8px auto 0; text-align:center; color:var(--gpt-muted); font-size:11px; }
        .gpt-card { max-width:760px; margin: 14px auto 0; border:1px solid var(--gpt-border); background:var(--gpt-surface); border-radius:18px; overflow:hidden; }
        .gpt-card-head { padding:14px 16px; border-bottom:1px solid var(--gpt-border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .gpt-card-grid { padding:16px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
        .gpt-card-section { border:1px solid var(--gpt-border); border-radius:14px; padding:12px; background:var(--gpt-bg); }
        .gpt-card-section h3 { font-size:13px; font-weight:700; margin:0 0 8px; display:flex; align-items:center; gap:6px; }
        .gpt-card-section ul { margin:0; padding-left:18px; color:var(--gpt-muted); font-size:12px; line-height:1.6; }

        .gpt-card-title-btn { display:flex; align-items:center; gap:8px; border:0; background:transparent; color:var(--gpt-text); padding:0; font:inherit; font-weight:600; cursor:default; }
        .gpt-card-toggle { display:none; align-items:center; justify-content:center; width:24px; height:24px; border-radius:999px; color:var(--gpt-muted); transition:transform .16s ease, background .16s ease, color .16s ease; }
        .gpt-card-toggle svg { transition:transform .16s ease; }
        .gpt-card.collapsed .gpt-card-toggle svg { transform:rotate(-90deg); }
        .gpt-card.collapsed .gpt-card-grid { display:none; }
        .gpt-card.collapsed .gpt-card-head { border-bottom:0; }
        .gpt-loading-dots span { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gpt-muted); margin-right:4px; animation:gptDot 1s infinite ease-in-out; }
        .gpt-loading-dots span:nth-child(2){ animation-delay:.15s; } .gpt-loading-dots span:nth-child(3){ animation-delay:.3s; }
        @keyframes gptDot { 0%,80%,100%{ opacity:.3; transform:translateY(0);} 40%{ opacity:1; transform:translateY(-3px);} }
        .gpt-mobile-menu { display:none; }
        .gpt-modal-backdrop { position:fixed; inset:0; z-index:100000; background:rgba(0,0,0,.62); display:flex; align-items:center; justify-content:center; padding:18px; }
        .gpt-modal { width:100%; max-width:390px; background:var(--gpt-bg); color:var(--gpt-text); border:1px solid var(--gpt-border); border-radius:18px; box-shadow:0 20px 80px rgba(0,0,0,.35); padding:22px; position:relative; }
        .cora-login-card { max-width:420px; padding:0; overflow:hidden; background:linear-gradient(180deg, var(--gpt-bg), var(--gpt-surface)); }
        .cora-login-hero { padding:26px 24px 18px; border-bottom:1px solid var(--gpt-border); display:flex; align-items:center; gap:14px; }
        .cora-login-logo { width:48px; height:48px; border-radius:16px; object-fit:cover; box-shadow:0 10px 30px rgba(0,0,0,.18); }
        .cora-login-title { font-size:20px; font-weight:800; letter-spacing:.2px; }
        .cora-login-desc { margin-top:4px; font-size:13px; color:var(--gpt-muted); line-height:1.55; }
        .cora-login-body { padding:20px 24px 24px; }
        .cora-login-google { width:100%; height:48px; border-radius:14px; border:1px solid var(--gpt-border); background:var(--gpt-surface-2); color:var(--gpt-text); display:flex; align-items:center; justify-content:center; gap:10px; font-size:14px; font-weight:700; transition:transform .15s ease, background .15s ease; }
        .cora-login-google:hover { background:var(--gpt-hover); transform:translateY(-1px); }
        .cora-login-note { margin-top:13px; text-align:center; color:var(--gpt-muted); font-size:12px; line-height:1.5; }
        .cora-login-close { position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:transparent; color:var(--gpt-muted); }
        .cora-login-close:hover { background:var(--gpt-hover); color:var(--gpt-text); }

        .cora-history-backdrop { display:none; }
        .cora-history-drawer { display:none; }

        .cora-floating-avatar { position:absolute; right:28px; bottom:112px; width:196px; height:250px; border:1px solid var(--gpt-border); border-radius:28px; background:var(--gpt-surface); box-shadow:0 18px 46px rgba(0,0,0,.18); overflow:visible; z-index:4; }
        .cora-floating-avatar > div:last-child { width:100%; height:100%; border-radius:28px; overflow:hidden; }
        .cora-floating-avatar-label {
    display: none !important;
}
        @media (max-width: 1180px) { .cora-floating-avatar { width:164px; height:210px; right:18px; bottom:112px; opacity:.96; } }
        @media (max-width: 860px) { .cora-floating-avatar { display:block; width:96px; height:122px; right:12px; top:68px; bottom:auto; border-radius:20px; opacity:.98; box-shadow:0 12px 32px rgba(0,0,0,.16); } .cora-floating-avatar > div:last-child { border-radius:20px; } .cora-floating-avatar-label { top:-28px; left:6px; font-size:10px; padding:4px 8px; } }
        @media (max-width: 768px) {
            .gpt-sidebar { position:fixed; inset:0 auto 0 0; z-index:99999; transform:translateX(-105%); transition:transform .22s ease; box-shadow:18px 0 45px rgba(0,0,0,.35); }
            .gpt-sidebar.open { transform:translateX(0); }
            .gpt-mobile-backdrop { position:fixed; inset:0; z-index:99998; background:rgba(0,0,0,.45); }
            .gpt-mobile-menu { display:flex; }
            .gpt-topbar { padding:0 12px; }
            .gpt-chat { padding-top:132px; }
            .gpt-title { font-size:16px; max-width:calc(100vw - 168px); }
            .gpt-message-row { padding:16px 14px; }
            .gpt-message-inner { gap:12px; }
            .gpt-user-bubble { max-width:82%; }
            .gpt-card-grid { grid-template-columns:1fr; }
            .gpt-composer-wrap { padding:10px 12px 14px; }
        }

        /* v4 layout: ChatGPT-like right chat area + large borderless CORA avatar */
        @media (min-width: 1024px) {
            .gpt-chat { padding: 20px 0 176px; }
            .gpt-message-inner { max-width: 760px; margin-left: 390px; margin-right: auto; }
            .gpt-card { max-width: 760px; margin-left: 390px; margin-right: auto; }
            .gpt-composer { max-width: 700px; margin-left: 390px; margin-right: auto; }
            .gpt-disclaimer { max-width: 700px; margin-left: 390px; margin-right: auto; }
            .cora-floating-avatar {
                left: 54px;
                right: auto;
                top: 142px;
                bottom: auto;
                width: 330px;
                height: 430px;
                border: 0 !important;
                border-radius: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                overflow: visible;
                pointer-events: none;
            }
            .cora-floating-avatar > div:last-child {
                width: 100%;
                height: 100%;
                border-radius: 0 !important;
                background: transparent !important;
                overflow: visible !important;
            }
            .cora-floating-avatar > div:last-child > div {
                background: transparent !important;
                border-radius: 0 !important;
            }
            .cora-floating-avatar-label {
                left: -8px;
                top: -38px;
                background: transparent !important;
                border: 0 !important;
                box-shadow: none !important;
                padding: 0;
                color: var(--gpt-text);
                font-size: 16px;
                font-weight: 700;
                pointer-events: none;
            }
        }

        @media (max-width: 1023px) {
            .gpt-chat { padding-top: 170px; }
            .cora-floating-avatar {
                display: block;
                left: 50%;
                right: auto;
                top: 62px;
                bottom: auto;
                transform: translateX(-50%);
                width: 128px;
                height: 160px;
                border: 0 !important;
                border-radius: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                overflow: visible;
                pointer-events: none;
            }
            .cora-floating-avatar > div:last-child,
            .cora-floating-avatar > div:last-child > div {
                border-radius: 0 !important;
                background: transparent !important;
                overflow: visible !important;
            }
            .cora-floating-avatar-label {
                left: -42px;
                top: 12px;
                background: transparent !important;
                border: 0 !important;
                box-shadow: none !important;
                padding: 0;
                font-size: 12px;
                font-weight: 700;
                color: var(--gpt-text);
                pointer-events: none;
            }
        }

        @media (max-width: 640px) {
            .gpt-topbar { height: 54px; padding: 0 12px; }
            .gpt-title { font-size: 15px; }
            .gpt-subtitle { display: none; }
            .gpt-chat { padding-top: 150px; padding-bottom: 156px; }
            .cora-floating-avatar { top: 58px; width: 112px; height: 140px; }
            .cora-floating-avatar-label { left: -36px; top: 10px; font-size: 11px; }
            .gpt-message-row { padding-left: 12px; padding-right: 12px; }
            .gpt-message-inner { gap: 10px; }
            .gpt-user-bubble { max-width: 82%; }
            .gpt-composer-wrap { padding-left: 10px; padding-right: 10px; }
        }


        /* v5 fixes: readable light mode, adaptive image bubbles, mobile avatar box */
        body:not(.dark) .text-zinc-100,
        body:not(.dark) .text-zinc-200,
        body:not(.dark) .text-zinc-300,
        body:not(.dark) .text-zinc-400,
        body:not(.dark) .text-slate-100,
        body:not(.dark) .text-slate-200,
        body:not(.dark) .text-slate-300,
        body:not(.dark) .text-slate-400,
        body:not(.dark) .text-white { color: var(--gpt-text) !important; }
        body:not(.dark) .gpt-history-section-title,
        body:not(.dark) .gpt-subtitle,
        body:not(.dark) .gpt-disclaimer,
        body:not(.dark) .gpt-card-section ul,
        body:not(.dark) .gpt-muted-text { color: var(--gpt-muted) !important; }
        body:not(.dark) .gpt-user-card { color: var(--gpt-text) !important; }
        body:not(.dark) .gpt-user-card .text-\[11px\] { color: var(--gpt-muted) !important; }
        body:not(.dark) .gpt-sidebar-footer { border-top-color: var(--gpt-border); }

        .gpt-bubble:has(.gpt-images) { width: fit-content; }
        .gpt-user-bubble:has(.gpt-images) { max-width: min(76%, 440px); padding: 8px; border-radius: 20px; }
        .gpt-images:has(img:only-child) { display:block; margin-bottom: 6px; }
        .gpt-images:has(img:only-child) .gpt-image-thumb { width:auto; max-width:min(340px, 64vw); max-height:360px; object-fit:contain; display:block; border-radius:16px; }
        .gpt-images .gpt-image-thumb { height:auto; object-fit:contain; }

        /* v6 mobile avatar: align to composer left edge and keep a clear gap above input */
        @media (max-width: 1023px) {
            .cora-floating-avatar-label { display:none !important; }
            .cora-floating-avatar {
                left: 14px !important;
                right: auto !important;
                top: auto !important;
                bottom: 104px !important;
                transform: none !important;
                width: 118px !important;
                height: 152px !important;
                border: 1px solid var(--gpt-border) !important;
                border-radius: 18px !important;
                background: var(--gpt-surface) !important;
                box-shadow: 0 10px 26px rgba(0,0,0,.16) !important;
                overflow: hidden !important;
                pointer-events: none;
                z-index: 3;
            }
            .cora-floating-avatar > div:last-child,
            .cora-floating-avatar > div:last-child > div {
                border-radius: 18px !important;
                background: var(--gpt-surface) !important;
                overflow: hidden !important;
            }
            .gpt-chat { padding-top: 18px !important; padding-bottom: 300px !important; }
            .gpt-composer-wrap { z-index: 6; }
        }
        @media (max-width: 640px) {
            .cora-floating-avatar { left: 14px !important; bottom: 100px !important; width: 112px !important; height: 146px !important; }
            .gpt-user-bubble:has(.gpt-images) { max-width: min(86%, 340px); }
            .gpt-images:has(img:only-child) .gpt-image-thumb { max-width:min(260px, 72vw); max-height:300px; }
        }


        /* v7 fixes: compatible icons, adaptive message/image bubbles, mobile card below input */
        .gpt-user-bubble {
            flex: 0 1 auto;
            width: fit-content;
            max-width: min(70%, 760px);
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .gpt-bubble.gpt-has-images {
            width: fit-content;
            max-width: min(76%, 460px);
        }
        .gpt-user-bubble.gpt-has-images {
            padding: 8px;
            border-radius: 20px;
        }
        .gpt-message-text {
            display: block;
            width: fit-content;
            max-width: 100%;
        }
        .gpt-images {
            max-width: 100%;
            align-items: flex-start;
        }
        .gpt-images.single-image {
            display: block;
            width: fit-content;
        }
        .gpt-images.single-image .gpt-image-thumb {
            display: block;
            width: auto;
            height: auto;
            max-width: min(360px, 68vw);
            max-height: 380px;
            object-fit: contain;
        }
        .gpt-images.multi-image .gpt-image-thumb {
            width: auto;
            height: auto;
            max-width: 150px;
            max-height: 150px;

            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Convert kebab-case to PascalCase for Lucide CDN icons
                    const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                    
                    // Try to find the icon in lucide.icons or lucide directly
                    const icon = (lucide.icons && lucide.icons[pascalName]) || 
                                 (lucide.icons && lucide.icons[name]) || 
                                 lucide[pascalName] || 
                                 lucide[name] || 
                                 (lucide.icons && lucide.icons['HelpCircle']) || 
                                 lucide['HelpCircle'];
                    
                    if (icon && typeof icon.toSvg === 'function') {
                        iconRef.current.innerHTML = icon.toSvg({
                            'stroke-width': 2,
                            'width': size,
                            'height': size,
                            'class': className
                        });
                    } else {
                        console.warn(`Icon not found: ${name}`);
                        // Final fallback: try to use createIcons if direct access fails
                        iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        if (typeof lucide.createIcons === 'function') {
                            lucide.createIcons();
                        }
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }} />;
        };

                const stopMouth = () => {

                    stopMouth();

                    try {
                        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                        if (!AudioContextClass || !audio) throw new Error("AudioContext unavailable");

                        const ctx = mouthAudioContextRef.current || new AudioContextClass();
                        mouthAudioContextRef.current = ctx;
                        if (ctx.state === "suspended") await ctx.resume();

                        if (!audio._coraMouthSource) {
                            audio._coraMouthSource = ctx.createMediaElementSource(audio);
                        }

                        const analyser = ctx.createAnalyser();
                        analyser.fftSize = 256;
                        analyser.smoothingTimeConstant = 0.12;
                        audio._coraMouthSource.connect(analyser);
                        analyser.connect(ctx.destination);

                        mouthAnalyserRef.current = analyser;
                        mouthDataRef.current = new Uint8Array(analyser.frequencyBinCount);

                        const tick = () => {
                            if (!audioEnabled || audio.paused || audio.ended) {
                                stopMouth();
                                return;
                            }

                            // 讓嘴巴比語音結束早 0.8 秒閉上，避免結尾延遲。音訊本身仍正常播放到結束。
                            if (Number.isFinite(audio.duration) && audio.duration > 0 && (audio.duration - audio.currentTime) <= 0.8) {
                                stopMouth();
                                return;
                            }

                            analyser.getByteTimeDomainData(mouthDataRef.current);
                            let sum = 0;
                            for (let i = 0; i < mouthDataRef.current.length; i++) {
                                const v = mouthDataRef.current[i] - 128;
                                sum += v * v;
                            }
                            const volume = Math.sqrt(sum / mouthDataRef.current.length) / 128;

                            // 1 / 0 瞬間口型：有聲音立即張嘴，停頓立即閉嘴。
                            setMouthInstant(volume > 0.018);
                            mouthRafRef.current = requestAnimationFrame(tick);
                        };

                        tick();
                    } catch (err) {
                        console.warn("音量偵測失敗，改用快速 1/0 嘴型：", err);
                        stopMouth();
                        mouthTimerRef.current = setInterval(() => {
                            setMouthInstant(!mouthLastStateRef.current);
                        }, 90);

                };

                    mouthTimerRef.current = setInterval(() => {
                        setMouthInstant(!mouthLastStateRef.current);

                    stopMouth();

                    if (ttsAudioRef.current) {
                        ttsAudioRef.current.pause();
                        ttsAudioRef.current = null;
                    }

                    if (!audioEnabled || !text) return;

                    // 使用新的 Google Gemini TTS：Cloudflare Worker action: "tts"
                    // GeminiData 只負責 Knowledge Graph 查詢，不負責語音。
                    // Worker 應回傳 { audioBase64, mimeType } 或 { audioUrl }。
                    const ttsData = await client.tts(text, idToken);

                    let audioSrc = "";

                    if (ttsData?.audioUrl) {
                        audioSrc = ttsData.audioUrl;
                    } else if (ttsData?.audioBase64) {
                        audioSrc = `data:${ttsData.mimeType || "audio/mpeg"};base64,${ttsData.audioBase64}`;
                    }

                    if (!audioSrc) {
                        throw new Error("Google Gemini TTS 沒有回傳音訊");
                    }

                    const audio = new Audio(audioSrc);
                    ttsAudioRef.current = audio;

                    audio.onplay = () => {
                        if (audioEnabled) startVolumeMouth(audio);
                    };

                    audio.onended = stopMouth;
                    audio.onerror = stopMouth;
                    audio.onpause = stopMouth;

                    await audio.play();

                } catch (err) {

                    console.warn("Google Google Gemini TTS 失敗，不退回瀏覽器語音：", err);
                    stopMouth();
                    window.speechSynthesis?.cancel();
                }
            };

            const notifyReply = () => {
                // Android 通常可用；iPhone Safari 對震動 API 支援較有限，PWA 或部分瀏覽器可能有效。
                if (navigator.vibrate) {
                    navigator.vibrate([80, 40, 80]);
                }
            };

            const startListening = () => {
                if (recognitionRef.current && !isListening) {
                    recognitionRef.current.start();
                    setIsListening(true);
                } else if (isListening) {
                    recognitionRef.current?.stop();
                }
            };

            const handleFileChange = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                const newStaged = [...stagedImages];
                for (let file of files) {
                    const dataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    newStaged.push({ data: dataUrl });
                }
                setStagedImages(newStaged);
                e.target.value = "";
            };

            const handleSend = async (overrideInput) => {
                const currentInput = overrideInput || input;
                if (sendingRef.current || loading || (!currentInput.trim() && stagedImages.length === 0)) return;
                sendingRef.current = true;

                const text = currentInput.trim() || "請協助分析這些藥物相關圖片。";
                const currentImages = stagedImages.map(img => img.data);
                
                setInput("");
                setStagedImages([]);
                
                const userMessage = { id: Date.now().toString(), role: "user", content: text, images: currentImages };
                const nextMessagesBeforeSend = [...messages, userMessage];
                setMessages(nextMessagesBeforeSend);
                const activeId = activeSavedChatIdRef.current || activeSavedChatId || `local-${Date.now()}`;
                if (!activeSavedChatIdRef.current) setActiveSavedChatId(activeId);
                touchChatToTop(activeId, {
                    title: makeChatTitle(text),
                    messages: nextMessagesBeforeSend,
                    chatMemory: [...chatMemory, { role: "user", content: text }].slice(-10),
                    medicationInfo,
                    geminiChatId: geminiChatId || ""
                });
                const currentMemory = [...chatMemory, { role: "user", content: text }].slice(-10);
                setChatMemory(currentMemory);
                setLoading(true);

                try {
                    const systemPrompt = `你是一位名叫 Cora 的專業且親切的藥劑師助手，回答要自然、簡潔、像真人藥師聊天。請以 JSON 格式回傳：{"answer": "口語解釋", "ingredients": [], "indications": [], "side_effects": [], "warnings": [], "reference_image_query": "搜尋關鍵字"}。使用繁體中文。`;
                    
                    const history = [...messages, userMessage].slice(-6).map(msg => {
                        let content = msg.content;
                        if (msg.images && msg.images.length > 0) {
                            content = [{ type: "text", text: msg.content }];
                            msg.images.forEach(url => content.push({ type: "image_url", image_url: { url } }));
                        }
                        return { role: msg.role, content };
                    });

                    const response = await client.ask(text, personalMemoryEnabled ? currentMemory : [], geminiChatId, idToken, activeId, currentImages, nextMessagesBeforeSend, personalMemoryEnabled, personalMemoryEnabled ? globalMemory : []);

                    if (response.chatId && response.chatId !== geminiChatId) {
                        setGeminiChatId(response.chatId);
                        localStorage.setItem("CORA_GEMINIDATA_CHAT_ID", response.chatId);
                    }

                    const finalChatId = response.conversationId || activeId;
                    if (finalChatId !== activeSavedChatIdRef.current) {
                        setActiveSavedChatId(finalChatId);
                    }

                    let aiText =
                        response.result ||
                        response.response ||
                        response.answer ||
                        response.message ||
                        (response.rawLLM && response.rawLLM.choices && response.rawLLM.choices[0] && response.rawLLM.choices[0].message && response.rawLLM.choices[0].message.content) ||
                        "目前沒有取得回答";

                    if (response.imagePrompt && !String(aiText).includes(response.imagePrompt)) {
                        aiText = `${aiText}

圖片生成提示詞：
${response.imagePrompt}`;
                    }

                    const drugCard =
                        response.drugCard ||
                        response.drug_card ||
                        response.card ||
                        null;

                    let info;

                    try {
                        info = JSON.parse(aiText);
                    } catch {
                        info = {
                            answer: aiText,
                            ingredients: drugCard?.ingredients || drugCard?.ingredient || [],
                            indications: drugCard?.indications || drugCard?.indication || [],
                            side_effects: drugCard?.side_effects || drugCard?.sideEffects || drugCard?.side_effect || [],
                            warnings: drugCard?.warnings || drugCard?.warning || drugCard?.contraindications || [],
                            reference_image_query: drugCard?.reference_image_query || ""
                        };
                    }

                    const toArray = (value) => {
                        if (!value) return [];
                        if (Array.isArray(value)) return value.filter(Boolean);
                        return String(value)
                            .split(/\n|、|;|；/)
                            .map(item => item.trim())
                            .filter(Boolean);
                    };

                    info.ingredients = toArray(info.ingredients);
                    info.indications = toArray(info.indications);
                    info.side_effects = toArray(info.side_effects);
                    info.warnings = toArray(info.warnings);
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: "assistant",
                        content: info.answer,
                        medicationInfo: info
                    };

                    const finalMessages = [...nextMessagesBeforeSend, assistantMessage];
                    const finalMemory = [...currentMemory, { role: "assistant", content: info.answer }].slice(-10);
                    setMessages(finalMessages);
                    const hasDrugCardData = [info.ingredients, info.indications, info.side_effects, info.warnings].some(arr => Array.isArray(arr) && arr.length > 0) || !!info.reference_image_query;
                    setMedicationInfo(hasDrugCardData ? info : null);
                    setCardCollapsed(window.innerWidth <= 768);
                    setChatMemory(finalMemory);
                    if (personalMemoryEnabled) {
                        const nextGlobalMemory = buildPersonalMemory(globalMemory, text, info.answer, response.title || makeChatTitle(text));
                        setGlobalMemory(nextGlobalMemory);
                        savePersonalMemoryToCloud(nextGlobalMemory, idToken);
                    }
                    touchChatToTop(finalChatId, {
                        title: makeChatTitle(text),
                        messages: finalMessages,
                        chatMemory: finalMemory,
                        medicationInfo: hasDrugCardData ? info : null,
                        geminiChatId: response.chatId || geminiChatId || ""
                    }, finalChatId !== activeId ? activeId : null);
                    notifyReply();
                    speakLocal(info.answer);
                } catch (err) {
                    console.error(err);
                    setIsTalking(false);
                    const errorText = "抱歉，可能因為網路不穩定或 API 暫時中斷，這次訊息沒有成功生成。請確認網路後再試一次。";
                    setMessages(prev => [...prev, { id: Date.now().toString(), role: "assistant", content: errorText }]);
                    notifyReply();
                    speakLocal(errorText);
                } finally {
                    setLoading(false);
                    sendingRef.current = false;
                }
            };

            const toggleSidebar = (event = null) => {
                if (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }

                // 語音播放、嘴型動畫、TTS audio/speechSynthesis 都不應該阻擋側邊欄收合。
                // 用 functional update，避免播放期間 React 重新渲染造成狀態卡住。
                if (window.innerWidth <= 768) {
                    setHistoryOpen(true);
                    return;

                setSidebarCollapsed(prev => !prev);

                const MedicationCard = useCallback(() => {

                                <a href={`https://www.google.com/search?q=${encodeURIComponent(medicationInfo.reference_image_query)}&tbm=isch`} target="_blank" className="text-xs underline" style={{ color: "var(--gpt-muted)" }}>查看參考圖片</a>
                            )}
                        </div>
                        {!cardCollapsed && (
                            <div className="gpt-card-grid">
                                <div className="gpt-card-section"><h3><Icon name="pill" size={15} />主要成分</h3><ul>{(medicationInfo.ingredients && medicationInfo.ingredients.length ? medicationInfo.ingredients : ["可於對話回答中查看重點說明"]).map((item, idx) => <li key={idx}>{item}</li>)}</ul></div>
                                <div className="gpt-card-section"><h3><Icon name="shield-alert" size={15} />適應症</h3><ul>{(medicationInfo.indications && medicationInfo.indications.length ? medicationInfo.indications : ["可於對話回答中查看重點說明"]).map((item, idx) => <li key={idx}>{item}</li>)}</ul></div>
                                <div className="gpt-card-section"><h3><Icon name="alert-triangle" size={15} />常見副作用</h3><ul>{(medicationInfo.side_effects && medicationInfo.side_effects.length ? medicationInfo.side_effects : ["若有不適或特殊疾病，建議諮詢醫師或藥師"]).map((item, idx) => <li key={idx}>{item}</li>)}</ul></div>
                                <div className="gpt-card-section"><h3><Icon name="badge-alert" size={15} />禁忌與注意事項</h3><ul>{(medicationInfo.warnings && medicationInfo.warnings.length ? medicationInfo.warnings : ["本系統僅供衛教參考，實際用藥請依醫囑與藥袋標示"]).map((item, idx) => <li key={idx}>{item}</li>)}</ul></div>
                            </div>
                        )}
                    </div>
                );
            }, [medicationInfo, cardCollapsed]);

            return (

                                <p className="text-sm mb-5" style={{ color: "var(--gpt-muted)" }}>確定要刪除「{deleteTargetChat.title || "未命名對話"}」嗎？此操作無法復原。</p>
                                <div className="flex justify-end gap-2">

                                </div>
                            </div>

                    {chatLoading && (

                                <div className="w-6 h-6 rounded-full border-2 border-zinc-400 border-t-transparent animate-spin"></div>
                                <div className="text-sm">正在載入聊天室...</div>

                                <div className="cora-login-hero">

                                    </div>
                                </div>
                                <div className="cora-login-body">
                                    <button className="cora-login-google" onClick={signInWithGoogle}>
                                        <span className="w-5 h-5 rounded-full bg-white text-slate-800 flex items-center justify-center font-bold text-xs">G</span>
                                        <span>使用 Google 帳號繼續</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                    {previewImage && (
                        <div onClick={() => setPreviewImage(null)} className="fixed inset-0 bg-black/90 z-[100000] flex items-center justify-center p-4 cursor-zoom-out">
                            <button onClick={(e) => { e.stopPropagation(); setPreviewImage(null); }} className="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white text-2xl">×</button>

                    {historyOpen && <div className="gpt-mobile-backdrop active" onClick={() => setHistoryOpen(false)}></div>}

                    <aside className={`gpt-sidebar ${historyOpen ? "open" : ""} ${sidebarCollapsed ? "desktop-collapsed" : ""}`}>

                            <div className="min-w-0 flex-1">
                                <div className="text-sm font-semibold truncate">CORA</div>
                                <div className="text-[11px] text-zinc-400 truncate">AI 藥物解說系統</div>

                            <button className="gpt-icon-btn-dark md:hidden" onClick={() => setHistoryOpen(false)}>✕</button>
                        </div>

                        <button type="button" onClick={startNewConversation} className="gpt-new-chat">

                        </button>

                        <div className="gpt-history-list">
                            <div className="gpt-history-section-title">最近對話</div>
                            {savedChats.length === 0 && (
                                <div className="text-xs text-zinc-400 px-3 py-2">尚無對話紀錄</div>
                            )}
                            {sortChatsNewestFirst(savedChats).map(chat => (
                                <div key={chat.id} className={`gpt-history-row ${activeSavedChatId === chat.id ? "active" : ""}`}>
                                    <button type="button" onClick={() => loadConversation(chat)} className="gpt-history-main">
                                        <div className="gpt-history-title">{chat.title || "未命名對話"}</div>
                                    </button>
                                    <button type="button" title="刪除聊天室" onClick={(e) => { e.stopPropagation(); setDeleteTargetChat(chat); }} className="gpt-delete-btn"><Icon name="trash-2" size={15} /></button>
                                </div>
                            ))}
                        </div>

                        <div className="gpt-sidebar-footer">
                            <button title={currentUser ? "開啟個人對話歷史" : "登入 CORA"} onClick={() => currentUser ? setHistoryOpen(true) : setLoginOpen(true)} className="gpt-user-card">
                                {currentUser?.photoURL ? <img src={currentUser.photoURL} className="w-8 h-8 rounded-full object-cover" referrerPolicy="no-referrer" /> : <div className="w-8 h-8 rounded-full bg-zinc-700 flex items-center justify-center">👤</div>}
                                <div className="min-w-0 flex-1">
                                    <div className="text-sm truncate">{currentUser?.displayName || "登入 CORA"}</div>
                                    <div className="text-[11px] text-zinc-400 truncate">{currentUser ? "已啟用雲端記憶" : "儲存對話紀錄"}</div>
                                </div>
                            </button>
                            <button type="button" onClick={() => setPersonalMemoryEnabled(prev => !prev)} className="gpt-new-chat" title="個人記憶模式">
                                <Icon name={personalMemoryEnabled ? "brain" : "brain-circuit"} size={17} />
                                <span>{personalMemoryEnabled ? "個人記憶模式：開" : "個人記憶模式：關"}</span>
                            </button>
                            
                            {currentUser && <button onClick={signOutGoogle} className="gpt-new-chat text-zinc-300"><Icon name="log-out" size={17} /><span>登出</span></button>}
                            <div className="cora-legal-links cora-legal-links-mobile" aria-label="CORA legal links">
                                <a href="https://mixcyanx.github.io/CORA-AI-SYSTEM/privacy.html" target="_blank" rel="noopener noreferrer">隱私權政策</a>
                                <span className="cora-legal-dot">•</span>
                                <a href="https://mixcyanx.github.io/CORA-AI-SYSTEM/terms.html" target="_blank" rel="noopener noreferrer">服務條款</a>
                            </div>
                        </div>
                    </aside>

                    <section className={`gpt-main ${sidebarCollapsed ? "sidebar-is-collapsed" : ""}`}>
                        <header className="gpt-topbar">

                                <button type="button" className={`gpt-icon-btn gpt-sidebar-toggle ${sidebarCollapsed ? "sidebar-closed" : "sidebar-open"}`} onClick={(e) => toggleSidebar(e)} title={sidebarCollapsed ? "開啟側邊欄" : "收合側邊欄"} aria-label={sidebarCollapsed ? "開啟側邊欄" : "收合側邊欄"}><Icon name="panel-left" size={20} /></button>
                                <div className="min-w-0">
                                    <div className="gpt-title truncate mobile-only-title">CORA AI</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-1">
                                <button onClick={() => setTheme(theme === "light" ? "dark" : "light")} className="gpt-icon-btn" title="切換明暗模式"><Icon name={theme === "light" ? "moon" : "sun"} size={20} /></button>
                                <button onClick={() => {

                                    if (!nextAudio) {

                                        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
                                        if (ttsAudioRef.current) { ttsAudioRef.current.pause(); ttsAudioRef.current = null; }
                                        if (mouthTimerRef.current) { clearInterval(mouthTimerRef.current); mouthTimerRef.current = null; }

                        <div ref={scrollRef} className="gpt-chat">

                                    <div className="gpt-message-inner">

                                            {msg.role === "user" && currentUser?.photoURL ? <img src={currentUser.photoURL} className="w-full h-full object-cover" referrerPolicy="no-referrer" /> : <Icon name={msg.role === "user" ? "user" : "sparkles"} size={16} />}

                                <div className="gpt-input-row">
                                    <button onClick={startListening} className="gpt-icon-btn" title="語音輸入"><Icon name={isListening ? "radio" : "mic"} size={20} /></button>
                                    <button onClick={() => cameraInputRef.current?.click()} className="gpt-icon-btn" title="拍照"><Icon name="camera" size={20} /></button>
                                    <button onClick={() => fileInputRef.current?.click()} className="gpt-icon-btn" title="上傳圖片"><Icon name="image" size={20} /></button>
                                    <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" multiple onChange={handleFileChange} className="hidden" />
                                    <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleFileChange} className="hidden" />
                                    <input type="text" disabled={loading} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey && !e.nativeEvent.isComposing) { e.preventDefault(); if (!loading && !sendingRef.current) handleSend(); } }} placeholder="傳訊息給 CORA" className="gpt-text-input" />
                                    <button onClick={() => handleSend()} disabled={loading || (!input.trim() && stagedImages.length === 0)} className="gpt-send" title="送出"><Icon name="arrow-up" size={18} /></button>

                                <div className="cora-legal-links cora-legal-links-desktop" aria-label="CORA legal links">

                            </div>
                            {medicationInfo && (
                                <div className="gpt-card-under-input">
                                    <MedicationCard />
                                </div>
                            )}
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
