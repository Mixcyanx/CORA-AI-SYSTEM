    <style>
        :root {

        .gpt-card-grid { padding:16px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }

                    id: "greeting-new",
                    role: "assistant",
                    content: "已開啟新的對話，請問今天想查詢哪一種藥物？"
                };

                const existingEmpty = cleanupEmptyChats(savedChats, null).find(chat => isEmptyConversation(chat));
                const localId = existingEmpty?.id || `local-${Date.now()}`;

                setGeminiChatId(null);
                setChatMemory([]);
                setMedicationInfo(null);
                setCardCollapsed(window.innerWidth <= 768);
                setActiveSavedChatId(localId);
                setMessages([greeting]);

                setSavedChats(prev => {
                    const localChat = {
                        id: localId,
                        title: "新的對話",
                        messages: [greeting],
                        chatMemory: [],
                        medicationInfo: null,
                        geminiChatId: "",
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    const withoutOtherEmpty = (prev || []).filter(chat => chat.id === localId || !isEmptyConversation(chat));
                    const next = upsertChat(withoutOtherEmpty, localChat);
                    writeLocalChats(next.filter(item => String(item.id).startsWith("local-") && !isEmptyConversation(item)));
                    return next;
                });
                setHistoryOpen(false);
            };


            const confirmDeleteConversation = async () => {
                if (!deleteTargetChat) return;

                const target = deleteTargetChat;
                setDeleteTargetChat(null);

                setSavedChats(prev => {
                    const next = prev.filter(item => item.id !== target.id);
                    writeLocalChats(next.filter(item => String(item.id).startsWith("local-")));
                    return next;
                });

                if (activeSavedChatId === target.id) {
                    startNewConversation();
                }

                if (String(target.id).startsWith("local-")) return;

                const token = idToken || await getFreshIdToken();
                if (!token) return;

                try {
                    await client.deleteConversation(token, target.id);
                    await loadCloudHistory(token);
                } catch (err) {
                    console.warn("刪除對話失敗：", err);
                    alert("雲端刪除失敗，請確認 Worker.js 已更新 deleteConversation。");
                    await loadCloudHistory(token);
                }
            };

            const speakLocal = async (text, options = {}) => {

                const setMouthInstant = (mode) => {
                    const nextMode = mode === true ? "open" : (mode || "rest");
                    const nextValue = nextMode === "rest" ? false : nextMode;
                    if (mouthLastStateRef.current !== nextMode) {
                        mouthLastStateRef.current = nextMode;
                        setIsTalking(nextValue);
                    }
                };

                const stopMouth = () => {
                    setMouthInstant("rest");

                    if (mouthTimerRef.current) {
                        clearInterval(mouthTimerRef.current);
                        mouthTimerRef.current = null;
                    }

                    if (mouthRafRef.current) {
                        cancelAnimationFrame(mouthRafRef.current);
                        mouthRafRef.current = null;
                    }

                    if (mouthEarlyStopRef.current) {
                        clearTimeout(mouthEarlyStopRef.current);
                        mouthEarlyStopRef.current = null;
                    }
                };

                const stopSpeechKeepAlive = () => {
                    if (speechKeepAliveTimerRef.current) {
                        clearInterval(speechKeepAliveTimerRef.current);
                        speechKeepAliveTimerRef.current = null;
                    }
                };

                // v45: 桌機瀏覽器嘴巴時機修正。
                // 不再讓嘴巴等 55ms 才第一次張開；TTS 確認開始後立刻跑第一個嘴型。
                // Safari / 手機仍保留較保守的播放保護；桌機 Chrome/Edge 則避免「晚張嘴、早閉嘴」。
                const startSynthMouth = (chunkText = "") => {
                    stopMouth();
                    const chars = Array.from(String(chunkText || "").replace(/\s+/g, ""));
                    let i = 0;
                    const tick = () => {
                        if (!aiSpeechActiveRef.current || !audioEnabled) {
                            stopMouth();
                            return;
                        }
                        const ch = chars[i % Math.max(chars.length, 1)] || "";
                        const isPause = /[，。！？!?；;：:、,.]/.test(ch);
                        if (isPause) {
                            setMouthInstant("rest");
                        } else {
                            const useO = /[喔哦噢噯嗚烏無五午屋窩我握臥沃波播玻坡破婆摸魔莫膜佛服福復複付副負不部]/.test(ch);
                            const useSmall = /[的了是你我他她它這那個一以與及在有和或]/.test(ch) || /^[a-zA-Z0-9]$/.test(ch);
                            let nextMode;
                            if (useO) {
                                nextMode = "o";
                            } else if (mouthLastStateRef.current === "rest" || mouthLastStateRef.current === "o") {
                                nextMode = useSmall ? "small" : "open";
                            } else {
                                nextMode = mouthLastStateRef.current === "small" ? "open" : "small";
                            }
                            setMouthInstant(nextMode);
                        }
                        i++;
                        const nextDelay = isPause ? 180 : (/^[a-zA-Z0-9]$/.test(ch) ? 74 : 96);
                        mouthTimerRef.current = setTimeout(tick, nextDelay);
                    };
                    tick();
                };

                // v44：最後一句結束時嘴巴關閉補償。
                // 瀏覽器 TTS 的 onend 在 Safari/部分手機上有時會晚一點才觸發，
                // 所以除了 onend 關嘴，也依文字長度預估尾段時間，接近句尾時先把嘴巴收回閉合。
                const estimateSpeechDurationMs = (value) => {
                    const chars = Array.from(String(value || ""));
                    let ms = 280;
                    for (const ch of chars) {
                        if (/[，、,]/.test(ch)) ms += 170;
                        else if (/[。！？!?；;：:]/.test(ch)) ms += 240;
                        else if (/^[a-zA-Z0-9]$/.test(ch)) ms += 72;
                        else if (/[一-鿿]/.test(ch)) ms += isSafariBrowser() ? 176 : 155;
                        else ms += 105;
                    }
                    return Math.max(900, Math.min(30000, ms));
                };

                const forceCloseMouthNow = () => {
                    stopMouth();
                    setIsTalking(false);
                    requestAnimationFrame(() => setIsTalking(false));
                    setTimeout(() => setIsTalking(false), 40);
                    setTimeout(() => setIsTalking(false), 120);
                };

                const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

                const isSafariBrowser = () => {
                    const ua = navigator.userAgent || "";
                    const vendor = navigator.vendor || "";
                    return /Safari/i.test(ua) && !/Chrome|CriOS|Chromium|Android|Edg/i.test(ua) && /Apple/i.test(vendor);
                };

                const isMobileLikeBrowser = () => isMobileLikeDevice();

                const isDesktopSpeechBrowser = () => {
                    return !isSafariBrowser() && !isMobileLikeBrowser();
                };

                const cleanSpeechText = (value) => {
                    return sanitizeUtteranceForMobile(
                        String(value || "")
                            .replace(/```[\s\S]*?```/g, "")
                            .replace(/[#>*_`\[\](){}]/g, "")
                            .replace(/https?:\/\/\S+/g, "")
                            .replace(/\s+/g, " ")
                            .trim()
                    );
                };

                const splitSpeechText = (value) => {
                    const source = cleanSpeechText(value);
                    if (!source) return [];
                    if (options.mobileGreeting && isMobileLikeBrowser()) {
                        return [{ text: stripPunctuationForSpeech(source), pauseAfter: 0 }];
                    }
                    const desktopPauses = isDesktopExperience();
                    const maxChunk = isMobileLikeBrowser() ? 110 : 180;
                    const segments = splitSpeechSegmentsWithPauses(source, maxChunk, desktopPauses);
                    const maxChunks = isMobileLikeBrowser() ? 20 : 14;
                    return segments.slice(0, maxChunks);
                };

                const getVoicesReady = async () => {
                    if (!window.speechSynthesis) return [];
                    const maxTries = isMobileLikeBrowser() ? 50 : 30;
                    for (let i = 0; i < maxTries; i++) {
                        try { window.speechSynthesis.resume(); } catch {}
                        const voices = window.speechSynthesis.getVoices() || [];
                        if (voices.length) return voices;
                        await wait(120);
                    }
                    return window.speechSynthesis.getVoices() || [];
                };

                const pickVoice = (voices) => {
                    return voices.find(v => /HsiaoChen|HanHan|Mei-Jia|Sin-ji|Ting-Ting/i.test(v.name || "")) ||
                        voices.find(v => /Apple/i.test(v.name || "") && /^zh/i.test(v.lang || "")) ||
                        voices.find(v => v.name.includes("Microsoft") && v.lang === "zh-TW") ||
                        voices.find(v => v.lang === "zh-TW") ||
                        voices.find(v => /^zh[-_]?Hant/i.test(v.lang || "")) ||
                        voices.find(v => v.lang?.toLowerCase?.().startsWith("zh")) ||
                        null;
                };

                const speakOneChunk = async (chunk, preferredVoice, chunkOpts = {}) => {
                    const synth = window.speechSynthesis;
                    if (!synth || !chunk) return false;
                    const mobileSpeech = isMobileLikeBrowser();
                    const simpleMobile = !!chunkOpts.simpleMobile;
                    const maxAttempts = simpleMobile ? 2 : (mobileSpeech ? 3 : 8);

                    for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                        let started = false;
                        let finished = false;
                        let heardAudio = false;
                        let forceStartedTimer = null;
                        let watchdog = null;
                        let maxTimer = null;
                        let tailCloseTimer = null;

                        const ok = await new Promise(async (resolve) => {
                            const utterance = new SpeechSynthesisUtterance(chunk);
                            const voiceForAttempt = mobileSpeech
                                ? (attempt <= 2 ? preferredVoice : null)
                                : (attempt <= 4 ? preferredVoice : null);
                            const speakStartedAt = Date.now();
                            speechUtteranceRef.current = utterance;
                            utterance.lang = voiceForAttempt?.lang || (attempt % 2 ? "zh-TW" : "zh-Hant-TW");
                            utterance.rate = isSafariBrowser() ? 0.92 : 1.0;
                            utterance.pitch = 1.03;
                            utterance.volume = 1;
                            if (voiceForAttempt) utterance.voice = voiceForAttempt;

                            const cleanup = () => {
                                if (forceStartedTimer) clearTimeout(forceStartedTimer);
                                if (watchdog) clearTimeout(watchdog);
                                if (maxTimer) clearTimeout(maxTimer);
                                if (tailCloseTimer) clearTimeout(tailCloseTimer);
                                stopSpeechKeepAlive();
                            };

                            const markStarted = () => {
                                if (started || finished) return;
                                started = true;
                                heardAudio = true;
                                // v45: 桌機瀏覽器一開始就立刻張嘴，不做尾段預先閉嘴，避免晚張早閉。
                                if (audioEnabled) startSynthMouth(chunk);

                                if (!isDesktopSpeechBrowser()) {
                                    const closeAt = Math.max(520, estimateSpeechDurationMs(chunk) - (isSafariBrowser() ? 110 : 70));
                                    tailCloseTimer = setTimeout(() => {
                                        if (!finished && started) forceCloseMouthNow();
                                    }, closeAt);
                                }
                            };

                            const finish = (value) => {
                                if (finished) return;
                                finished = true;
                                cleanup();
                                forceCloseMouthNow();
                                resolve(value);
                            };

                            utterance.onstart = () => markStarted();
                            utterance.onboundary = (event) => {
                                markStarted();
                                // v45: 桌機 Chrome/Edge 的 boundary 可能早於實際聲音，不能用它提早閉嘴。
                                // 只在 Safari / 手機上做最後字保護。
                                if (!isDesktopSpeechBrowser()) {
                                    const idx = Number(event?.charIndex ?? -1);
                                    if (idx >= 0 && idx >= Math.max(0, String(chunk).length - 1)) {
                                        forceCloseMouthNow();
                                    }
                                }
                            };
                            utterance.onend = () => finish(started || (Date.now() - speakStartedAt > 500));
                            utterance.onerror = (event) => {
                                const err = event?.error || "";
                                if (heardAudio || started) {
                                    finish(true);
                                    return;
                                }
                                if (err === "interrupted" || err === "canceled") {
                                    finish(synth.speaking || synth.pending);
                                    return;
                                }
                                finish(false);
                            };

                            try {
                                // v47：iOS 在 cancel 後立即 speak 常靜默失敗；手機僅在重試時清空佇列。
                                if (!mobileSpeech || attempt > 1) {
                                    try { synth.cancel(); } catch {}
                                }
                                await wait(
                                    isSafariBrowser()
                                        ? (attempt === 1 ? 220 : 300)
                                        : (isDesktopSpeechBrowser()
                                            ? (attempt === 1 ? 20 : 80)
                                            : (attempt === 1 ? 140 : 220))
                                );
                                try { synth.resume(); } catch {}

                                stopSpeechKeepAlive();
                                speechKeepAliveTimerRef.current = setInterval(() => {
                                    try { synth.resume(); } catch {}
                                }, 350);

                                synth.speak(utterance);
                                try { synth.resume(); } catch {}

                                // v41: 不再用 pending 當作開始朗讀，避免聲音還沒出來嘴巴已經先張開。
                                // 只有確認 speaking 且不在 pending 佇列時，才作為 Safari 的後備啟動嘴型。
                                forceStartedTimer = setTimeout(() => {
                                    if (!finished && !started) {
                                        if (isDesktopSpeechBrowser()) markStarted();
                                        else if (synth.speaking && !synth.pending) markStarted();
                                    }
                                }, isSafariBrowser() ? 180 : (isDesktopSpeechBrowser() ? 18 : 90));

                                watchdog = setTimeout(() => {
                                    if (!started && !finished) {
                                        try { synth.resume(); } catch {}
                                        if (synth.speaking || synth.pending) markStarted();
                                        else finish(false);
                                    }
                                }, simpleMobile
                                    ? 2400
                                    : (isSafariBrowser() ? (attempt <= 3 ? 1800 : 2600) : (attempt <= 2 ? 1200 : 2000)));

                                maxTimer = setTimeout(() => {
                                    finish(started || synth.speaking);
                                }, Math.min(36000, Math.max(5500, chunk.length * 310)));
                            } catch {
                                finish(false);
                            }
                        });

                        if (ok || heardAudio) return true;
                        if (synth.speaking || synth.pending) return true;
                        try { synth.cancel(); } catch {}
                        await wait((isSafariBrowser() ? 320 : 220) + attempt * 140);
                    }

                    return false;
                };

                try {

                    const currentTtsSession = ++ttsSessionIdRef.current;
                    const mobileSpeech = isMobileLikeBrowser();
                    unlockBrowserTTSIfNeeded({ force: mobileSpeech });
                    stopMouth();
                    stopSpeechKeepAlive();
                    if (voiceAutoModeRef.current) {
                        forceStopAllRecognition(120000);
                    }
                    aiSpeechActiveRef.current = true;
                    ignoreRecognitionUntilRef.current = Date.now() + 120000;

                    if (!mobileSpeech) {
                        try { window.speechSynthesis?.cancel(); } catch {}
                    } else {
                        try { window.speechSynthesis?.resume(); } catch {}
                    }

                    if (ttsAudioRef.current) {
                        ttsAudioRef.current.pause();
                        ttsAudioRef.current = null;
                    }

                    if (!audioEnabled || !text) {
                        aiSpeechActiveRef.current = false;
                        ignoreRecognitionUntilRef.current = Date.now() + 2500;
                        return;
                    }

                    // v40：一律使用瀏覽器內建 TTS；針對 Safari 加入 AudioContext 保活、短句分段、無指定 voice 重試。
                    try { safariAudioContextRef.current?.resume?.(); } catch {}
                    if (!('speechSynthesis' in window) || !audioEnabled || currentTtsSession !== ttsSessionIdRef.current) {
                        aiSpeechActiveRef.current = false;
                        ignoreRecognitionUntilRef.current = Date.now() + 2500;
                        return;
                    }

                    const chunks = splitSpeechText(text);
                    if (!chunks.length) {
                        aiSpeechActiveRef.current = false;
                        ignoreRecognitionUntilRef.current = Date.now() + 2500;
                        return;
                    }

                    const voices = await getVoicesReady();
                    const preferredVoice = pickVoice(voices);

                    for (let ci = 0; ci < chunks.length; ci++) {
                        const segment = chunks[ci];
                        const chunk = typeof segment === "string" ? segment : segment.text;
                        const pauseAfter = typeof segment === "string" ? 0 : (segment.pauseAfter || 0);
                        if (!chunk) continue;
                        if (!audioEnabled || currentTtsSession !== ttsSessionIdRef.current) break;
                        if (mobileSpeech && ci > 0 && !pauseAfter) {
                            await wait(isSafariBrowser() ? 280 : 180);
                        }
                        const simpleMobile = !!(options.mobileGreeting && mobileSpeech);
                        let spoken = await speakOneChunk(chunk, preferredVoice, { simpleMobile });
                        if (!spoken && mobileSpeech && !simpleMobile && !window.speechSynthesis?.speaking && !window.speechSynthesis?.pending) {
                            unlockBrowserTTSIfNeeded({ force: true });
                            await wait(260);
                            spoken = await speakOneChunk(chunk, null, { simpleMobile: true });
                        }
                        if (!spoken) {
                            console.warn("瀏覽器 TTS 本段未成功播放：", chunk.slice(0, 30));
                        }
                        if (pauseAfter > 0) {
                            await wait(pauseAfter);
                        } else if (!isDesktopExperience()) {
                            await wait(mobileSpeech ? 200 : 120);
                        }
                    }

                } catch (err) {

                    console.warn("瀏覽器 TTS 播放失敗：", err);
                } finally {
                    stopSpeechKeepAlive();
                    try { window.speechSynthesis?.resume(); } catch {}
                    aiSpeechActiveRef.current = false;
                    // v40：TTS 函式結束就允許 handleSend 立刻重開麥克風。
                    ignoreRecognitionUntilRef.current = Date.now();
                    forceCloseMouthNow();
                }
            };

            speakLocalRef.current = speakLocal;

            const handleCharacterClick = () => {
                const now = Date.now();
                if (now - lastCharacterClickRef.current < 1800) return;
                lastCharacterClickRef.current = now;
                if (!audioEnabled) return;
                if (avatarTtsLockRef.current) return;

                if (isMobileOrTabletExperience()) {
                    if (greetingPlaybackActiveRef.current) {
                        stopActiveSpeech();
                        greetingPlaybackActiveRef.current = false;
                    }
                    avatarTtsLockRef.current = true;
                    greetingSpokenRef.current = true;
                    greetingSpeakPendingRef.current = false;
                    if (!ttsUnlockedRef.current) {
                        unlockBrowserTTSIfNeeded({ force: true });
                    }
                    const run = async () => {
                        try {
                            stopActiveSpeech();
                            await speakLocal(CORA_GREETING_TEXT, { mobileGreeting: true });
                        } finally {
                            avatarTtsLockRef.current = false;
                        }
                    };
                    run();
                    return;
                }

                if (greetingPlaybackActiveRef.current) {
                    stopActiveSpeech();
                    greetingPlaybackActiveRef.current = false;
                }
                unlockBrowserTTSIfNeeded({ force: false });
                speakLocal(pickRandomDesktopFunLine());
            };

            const notifyReply = () => {
                // Android 通常可用；iPhone Safari 對震動 API 支援較有限，PWA 或部分瀏覽器可能有效。
                if (navigator.vibrate) {
                    navigator.vibrate([80, 40, 80]);
                }
            };

            const clearVoiceTimers = () => {
                if (voiceRestartTimerRef.current) {
                    clearTimeout(voiceRestartTimerRef.current);
                    voiceRestartTimerRef.current = null;
                }
                if (voiceResultTimerRef.current) {
                    clearTimeout(voiceResultTimerRef.current);
                    voiceResultTimerRef.current = null;
                }
            };

            const forceStopAllRecognition = (cooldownMs = 1200) => {
                clearVoiceTimers();
                ignoreRecognitionUntilRef.current = Date.now() + cooldownMs;
                recognitionStartingRef.current = false;
                voiceLiveTranscriptRef.current = "";
                setIsListening(false);
                const recognition = recognitionRef.current;
                if (!recognition) return;
                try { recognition.abort?.(); } catch {}
                try { recognition.stop?.(); } catch {}
                setTimeout(() => {
                    try { recognition.abort?.(); } catch {}
                    try { recognition.stop?.(); } catch {}
                    recognitionStartingRef.current = false;
                    setIsListening(false);
                }, 60);
            };

            const startListeningInternal = () => {
                const recognition = recognitionRef.current;
                if (!voiceAutoModeRef.current) return;
                if (!recognition || recognitionStartingRef.current || sendingRef.current || loadingRef.current || voiceGenerationLockRef.current || voiceHardPausedForGenerationRef.current || aiSpeechActiveRef.current) return;
                if (window.speechSynthesis && (window.speechSynthesis.speaking || window.speechSynthesis.pending)) {
                    scheduleVoiceRestart(900);
                    return;
                }

                const waitMs = ignoreRecognitionUntilRef.current - Date.now();
                if (waitMs > 0) {
                    if (voiceRestartTimerRef.current) clearTimeout(voiceRestartTimerRef.current);
                    voiceRestartTimerRef.current = setTimeout(startListeningInternal, Math.min(waitMs + 80, 1800));
                    return;
                }

                try {
                    unlockBrowserTTSIfNeeded({ force: true });
                    voiceRecognitionSubmittingRef.current = false;
                    voiceLiveTranscriptRef.current = "";
                    recognitionStartingRef.current = true;
                    recognition.start();
                    setIsListening(true);
                } catch (err) {
                    recognitionStartingRef.current = false;
                    setIsListening(false);
                    console.warn("語音辨識啟動失敗：", err);
                    if (isMobileLikeDevice()) {
                        setTimeout(() => {
                            if (!voiceAutoModeRef.current || recognitionStartingRef.current) return;
                            try {
                                recognitionStartingRef.current = true;
                                recognition.start();
                                setIsListening(true);
                            } catch {}
                        }, 400);
                    }
                }
            };

            const pauseListeningOnly = () => {
                clearVoiceTimers();
                recognitionStartingRef.current = false;
                voiceRecognitionSubmittingRef.current = false;
                voiceGenerationLockRef.current = false;
                voiceHardPausedForGenerationRef.current = false;
                ignoreRecognitionUntilRef.current = Date.now() + 3600000;
                forceStopAllRecognition(3600000);
                setIsListening(false);
            };

            const scheduleVoiceRestart = (delayMs = 900) => {
                if (voiceRestartTimerRef.current) clearTimeout(voiceRestartTimerRef.current);
                voiceRestartTimerRef.current = setTimeout(() => {
                    voiceRestartTimerRef.current = null;
                    if (!voiceAutoModeRef.current || voiceManualPausedRef.current) return;
                    if (sendingRef.current || loadingRef.current || voiceGenerationLockRef.current || voiceHardPausedForGenerationRef.current || aiSpeechActiveRef.current) return;
                    if (window.speechSynthesis && (window.speechSynthesis.speaking || window.speechSynthesis.pending)) {
                        scheduleVoiceRestart(900);
                        return;
                    }
                    startListeningInternal();
                }, delayMs);
            };

            const startListening = () => {
                if (voiceAutoModeRef.current) {
                    voiceManualPausedRef.current = true;
                    voiceAutoModeRef.current = false;
                    setVoiceAutoMode(false);
                    pauseListeningOnly();
                    return;
                }

                if (!recognitionRef.current) {
                    alert("此瀏覽器不支援語音輸入。請使用 Safari（iPhone/iPad）或 Chrome（Android）開啟。");
                    return;
                }

                unlockBrowserTTSIfNeeded({ force: true });
                voiceManualPausedRef.current = false;
                voiceGenerationLockRef.current = false;
                voiceHardPausedForGenerationRef.current = false;
                voiceAutoModeRef.current = true;
                setVoiceAutoMode(true);
                ignoreRecognitionUntilRef.current = Date.now();
                startListeningInternal();
            };

            const handleFileChange = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                const newStaged = [...stagedImages];
                for (let file of files) {
                    const dataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    newStaged.push({ data: dataUrl });
                }
                setStagedImages(newStaged);
                e.target.value = "";
            };

            const handleSend = async (overrideInput, options = {}) => {
                const latestInput = inputRef.current || "";
                const currentInput = overrideInput !== undefined ? overrideInput : latestInput;
                const latestStagedImages = Array.isArray(stagedImagesRef.current) ? stagedImagesRef.current : [];
                const latestMessages = Array.isArray(messagesRef.current) ? messagesRef.current : [];
                const latestMemory = Array.isArray(chatMemoryRef.current) ? chatMemoryRef.current : [];
                const latestMedicationInfo = medicationInfoRef.current;
                const latestGeminiChatId = geminiChatIdRef.current;
                const latestIdToken = idTokenRef.current;
                const latestPersonalMemoryEnabled = personalMemoryEnabledRef.current;

                if (sendingRef.current || loadingRef.current || (!String(currentInput || "").trim() && latestStagedImages.length === 0)) return;

                const sendKey = `${String(currentInput || "").trim()}|${latestStagedImages.map(img => img.data || "").join(",").slice(0, 80)}`;
                const sendNow = Date.now();
                if (lastRequestKeyRef.current.key === sendKey && sendNow - lastRequestKeyRef.current.at < 12000) return;

                sendingRef.current = true;
                const wasVoiceAutoMode = !!voiceAutoModeRef.current;

                // v39：語音送出後立即強制中止所有錄音機制；AI 生成與瀏覽器 TTS 期間都不准重啟，TTS 完成後才恢復。
                if (options.fromVoice || wasVoiceAutoMode) {
                    voiceManualPausedRef.current = false;
                    voiceAutoModeRef.current = true;
                    setVoiceAutoMode(true);
                    voiceGenerationLockRef.current = true;
                    voiceHardPausedForGenerationRef.current = true;
                    voiceRecognitionSubmittingRef.current = true;

                const text = String(currentInput || "").trim() || "請協助分析這些藥物相關圖片。";

                setInput("");
                inputRef.current = "";
                setStagedImages([]);
                stagedImagesRef.current = [];
                
                const userMessage = { id: Date.now().toString(), role: "user", content: text, images: currentImages };
                const nextMessagesBeforeSend = [...latestMessages, userMessage];
                setMessages(nextMessagesBeforeSend);
                const activeId = activeSavedChatIdRef.current || activeSavedChatId || `local-${Date.now()}`;
                if (!activeSavedChatIdRef.current) setActiveSavedChatId(activeId);
                saveChatRecord(activeId, {
                    title: makeChatTitle(text),
                    messages: nextMessagesBeforeSend,
                    chatMemory: [...latestMemory, { role: "user", content: text }].slice(-10),
                    medicationInfo: latestMedicationInfo,
                    geminiChatId: latestGeminiChatId || ""
                }, { bumpUserActivity: true });
                const currentMemory = [...latestMemory, { role: "user", content: text }].slice(-10);
                setChatMemory(currentMemory);
                const shouldShowImageAnimation = false;
                setImageGenerating(false);
                setLoading(true);
                if (sendSafetyTimerRef.current) clearTimeout(sendSafetyTimerRef.current);
                sendSafetyTimerRef.current = setTimeout(() => {
                    // 防止網路/API 沒有回來時三點動畫無限卡住。
                    sendingRef.current = false;
                    loadingRef.current = false;
                    setLoading(false);
                    setImageGenerating(false);
                    voiceGenerationLockRef.current = false;
                    voiceHardPausedForGenerationRef.current = false;
                }, 90000);

                try {
                    const systemPrompt = `你是一位名叫 Cora 的專業且親切的藥劑師助手，回答要自然、簡潔、像真人藥師聊天。請以 JSON 格式回傳：{"answer": "口語解釋", "ingredients": [], "indications": [], "side_effects": [], "warnings": [], "reference_image_query": "搜尋關鍵字"}。使用繁體中文。`;
                    
                    const history = [...latestMessages, userMessage].slice(-6).map(msg => {
                        let content = msg.content;
                        if (msg.images && msg.images.length > 0) {
                            content = [{ type: "text", text: msg.content }];
                            msg.images.forEach(url => content.push({ type: "image_url", image_url: { url } }));
                        }
                        return { role: msg.role, content };
                    });

                    const response = await client.ask(text, latestPersonalMemoryEnabled ? currentMemory : [], latestGeminiChatId, latestIdToken, activeId, currentImages, nextMessagesBeforeSend, latestPersonalMemoryEnabled);

                    if (response.chatId && response.chatId !== latestGeminiChatId) {
                        setGeminiChatId(response.chatId);
                        localStorage.setItem("CORA_GEMINIDATA_CHAT_ID", response.chatId);
                    }

                    const finalChatId = response.conversationId || activeId;
                    if (finalChatId !== activeSavedChatIdRef.current) {
                        setActiveSavedChatId(finalChatId);
                    }

                    const aiText =
                        response.result ||
                        response.response ||
                        response.answer ||
                        response.message ||
                        (response.rawLLM && response.rawLLM.choices && response.rawLLM.choices[0] && response.rawLLM.choices[0].message && response.rawLLM.choices[0].message.content) ||
                        "目前沒有取得回答";

                    const drugCard =
                        response.drugCard ||
                        response.drug_card ||
                        response.card ||
                        null;

                    let info;

                    try {
                        info = JSON.parse(aiText);
                    } catch {
                        info = {
                            answer: aiText,
                            ingredients: drugCard?.ingredients || drugCard?.ingredient || [],
                            indications: drugCard?.indications || drugCard?.indication || [],
                            side_effects: drugCard?.side_effects || drugCard?.sideEffects || drugCard?.side_effect || [],
                            warnings: drugCard?.warnings || drugCard?.warning || drugCard?.contraindications || [],
                            reference_image_query: drugCard?.reference_image_query || ""
                        };
                    }

                    const toArray = (value) => {
                        if (!value) return [];
                        if (Array.isArray(value)) return value.filter(Boolean);
                        return String(value)
                            .split(/\n|、|;|；/)
                            .map(item => item.trim())
                            .filter(Boolean);
                    };

                    info.ingredients = toArray(info.ingredients);
                    info.indications = toArray(info.indications);
                    info.side_effects = toArray(info.side_effects);
                    info.warnings = toArray(info.warnings);
                    const generatedImages = response.generatedImages || response.images || [];
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: "assistant",
                        content: info.answer,
                        images: generatedImages,
                        medicationInfo: info
                    };

                    const finalMessages = [...nextMessagesBeforeSend, assistantMessage];
                    const finalMemory = [...currentMemory, { role: "assistant", content: info.answer }].slice(-10);
                    setMessages(finalMessages);
                    setMedicationInfo(info);
                    setCardCollapsed(window.innerWidth <= 768);
                    setChatMemory(finalMemory);
                    saveChatRecord(finalChatId, {
                        title: makeChatTitle(text),
                        messages: finalMessages,
                        chatMemory: finalMemory,
                        medicationInfo: info,
                        geminiChatId: response.chatId || latestGeminiChatId || ""
                    }, {
                        bumpUserActivity: false,
                        replaceId: finalChatId !== activeId ? activeId : null
                    });
                    notifyReply();
                    voiceLastAssistantTextRef.current = String(info.answer || "");
                    // v37：AI 文字已經顯示後立刻移除三點動畫，不要在朗讀期間保留第二個生成動畫。
                    setLoading(false);
                    setImageGenerating(false);
                    loadingRef.current = false;
                    await speakLocal(info.answer);
                    // v39：語音模式下，AI 朗讀完成後要自動恢復麥克風，形成無手對話。
                    shouldResumeVoiceAfterResponse = shouldResumeVoiceAfterResponse && !voiceManualPausedRef.current;
                } catch (err) {

                    setIsTalking(false);
                    const errorText = "抱歉，可能因為網路不穩定或 API 暫時中斷，這次訊息沒有成功生成。請確認網路後再試一次。";

                    notifyReply();
                    voiceLastAssistantTextRef.current = errorText;
                    setLoading(false);
                    setImageGenerating(false);
                    loadingRef.current = false;
                    await speakLocal(errorText);
                    // v39：錯誤提示朗讀後也維持語音模式，可繼續讓使用者補問。
                    shouldResumeVoiceAfterResponse = shouldResumeVoiceAfterResponse && !voiceManualPausedRef.current;

                    voiceRecognitionSubmittingRef.current = false;
                    voiceGenerationLockRef.current = false;
                    voiceHardPausedForGenerationRef.current = false;

                        setVoiceAutoMode(true);
                        startListeningInternal();
                    } else {
                        voiceAutoModeRef.current = false;
                        setVoiceAutoMode(false);
                        setIsListening(false);

                                            <div key={idx} className="gpt-staged-item">
                                                <img src={img.data} onClick={() => setPreviewImage(img.data)} className="w-full h-full object-cover cursor-zoom-in" />
                                                <button onClick={() => setStagedImages(prev => prev.filter((_, i) => i !== idx))} className="gpt-staged-remove"><Icon name="x" size={11} /></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="gpt-input-row">
                                    <button onClick={startListening} className="gpt-icon-btn" title={voiceAutoMode ? "暫停語音模式" : "語音輸入 / 開啟無手對話"}><Icon name={voiceAutoMode ? "pause" : "mic"} size={20} /></button>
                                    <button onClick={() => cameraInputRef.current?.click()} className="gpt-icon-btn" title="拍照"><Icon name="camera" size={20} /></button>
                                    <button onClick={() => fileInputRef.current?.click()} className="gpt-icon-btn" title="上傳圖片"><Icon name="image" size={20} /></button>
                                    <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" multiple onChange={handleFileChange} className="hidden" />
                                    <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={handleFileChange} className="hidden" />
                                    <input type="text" disabled={loading} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey && !e.nativeEvent.isComposing) { e.preventDefault(); if (!loading && !sendingRef.current) { unlockBrowserTTSIfNeeded({ force: needsStrictTTSGesture() }); handleSend(); } } }} placeholder="傳訊息給 CORA" className="gpt-text-input" />
                                    <button onClick={() => { unlockBrowserTTSIfNeeded({ force: needsStrictTTSGesture() }); handleSend(); }} disabled={loading || (!input.trim() && stagedImages.length === 0)} className="gpt-send" title="送出"><Icon name="arrow-up" size={18} /></button>
                                </div>
                            </div>
                            <div className="cora-disclaimer-row">
                                <div className="gpt-disclaimer">CORA 可能會出錯。本系統僅供衛教參考，實際用藥請務必諮詢醫師或藥師。</div>
                                <div className="cora-legal-links cora-legal-links-desktop" aria-label="CORA legal links">
                                    <a href="https://mixcyanx.github.io/CORA-AI-SYSTEM/privacy.html" target="_blank" rel="noopener noreferrer">隱私權政策</a>
                                    <span className="cora-legal-dot">•</span>
                                    <a href="https://mixcyanx.github.io/CORA-AI-SYSTEM/terms.html" target="_blank" rel="noopener noreferrer">服務條款</a>
                                </div>
                            </div>
                            {medicationInfo && (
                                <div className="gpt-card-under-input">
                                    <MedicationCard />
                                </div>
                            )}
                        </div>

                        {installModalOpen && (
                            <div className="cora-install-modal-backdrop" onClick={() => setInstallModalOpen(false)}>
                                <motion.div
                                    className="cora-install-modal"
                                    initial={{ opacity: 0, scale: .96, y: 12 }}
                                    animate={{ opacity: 1, scale: 1, y: 0 }}
                                    exit={{ opacity: 0, scale: .96, y: 12 }}
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <div className="cora-install-modal-head">
                                        <div className="cora-install-modal-title">加入 CORA AI 到主畫面</div>
                                        <button className="gpt-icon-btn" onClick={() => setInstallModalOpen(false)} title="關閉"><Icon name="x" size={20} /></button>
                                    </div>
                                    <div className="cora-install-modal-body">
                                        {isStandaloneMode() ? (
                                            <div><strong>CORA AI 已經是主畫面 App 模式。</strong><br />你可以直接從手機桌面開啟。</div>
                                        ) : isIOSDevice() ? (
                                            <>
                                                <div><strong>iPhone / iPad 需要手動加入。</strong></div>
                                                <div className="cora-install-steps">
                                                    <div>1. 使用 Safari 開啟 CORA AI 網頁。</div>
                                                    <div>2. 點選下方或上方的「分享」按鈕。</div>
                                                    <div>3. 選擇「加入主畫面」。</div>
                                                </div>
                                            </>
                                        ) : deferredInstallPrompt ? (
                                            <div>你的瀏覽器支援直接安裝，點選下方按鈕即可加入主畫面。</div>
                                        ) : (
                                            <>
                                                <div><strong>目前瀏覽器尚未提供原生安裝視窗。</strong></div>
                                                <div className="cora-install-steps">
                                                    <div>1. 打開瀏覽器右上角選單。</div>
                                                    <div>2. 選擇「安裝應用程式」或「加入主畫面」。</div>
                                                    <div>3. 若沒有出現，請確認網站是 HTTPS 並重新整理一次。</div>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                    <div className="cora-install-actions">
                                        <button className="cora-install-btn" onClick={() => setInstallModalOpen(false)}>稍後</button>
                                        {!isStandaloneMode() && !isIOSDevice() && deferredInstallPrompt && (
                                            <button className="cora-install-btn primary" onClick={runNativeInstallPrompt}>立即加入主畫面</button>
                                        )}
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
